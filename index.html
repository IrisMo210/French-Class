<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>La Classe de Français</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="La Classe">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6F4EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EF; --ink:#23262B; --ink-soft:#5C636E; --line:#E0DBD1;
    --m-deep:#2C5C86; --m-bg:#E6EEF6; --m-edge:#B9D0E5;
    --f-deep:#A8425A; --f-bg:#F7E6EA; --f-edge:#E8BFC9;
    --gold:#B68A35; --gold-bg:#FBF3E2; --gold-edge:#E3CC9A;
    --good:#3E7C4F; --good-bg:#E8F2EA; --bad:#B23A2E; --bad-bg:#F6E3E0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Karla',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 50px;}
  .wrap{max-width:640px;margin:0 auto;}

  .app-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin:8px 0 6px;}
  .app-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.9rem;text-align:center;letter-spacing:-.3px;line-height:1.1;}
  .app-title .m{color:var(--m-deep);font-style:italic;}
  .app-title .f{color:var(--f-deep);font-style:italic;}
  .app-sub{text-align:center;color:var(--ink-soft);font-size:.82rem;margin-top:4px;}

  .who{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 4px;}
  .who span{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);align-self:center;}
  .pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:.85rem;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .pill.on{background:var(--m-deep);border-color:var(--m-deep);color:#fff;}
  .pill.add{border-style:dashed;color:var(--gold);border-color:var(--gold-edge);background:var(--gold-bg);}

  .progressline{display:flex;justify-content:space-between;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:14px 0 6px;}
  .progressline div{text-align:center;flex:1;}
  .progressline b{display:block;font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--m-deep);}
  .progressline small{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
  .homebtns{display:flex;gap:9px;margin:10px 0 2px;}
  .homebtns button{flex:1;}
  .exportline{text-align:center;margin:8px 0 2px;}
  .exportline button{border:none;background:none;color:var(--ink-soft);font-size:.74rem;text-decoration:underline;cursor:pointer;font-family:'Karla',sans-serif;padding:3px 6px;}

  .bookhead{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:6px;margin:22px 2px 10px;line-height:1.5;}
  .lesson{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fff;cursor:pointer;}
  .lesson .num{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft);width:32px;flex:0 0 auto;}
  .lesson .t{font-weight:700;font-size:.92rem;flex:1;line-height:1.3;}
  .lesson .t small{display:block;font-weight:400;color:var(--ink-soft);font-size:.75rem;}
  .st{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.05em;border-radius:999px;padding:4px 9px;flex:0 0 auto;white-space:nowrap;}
  .st.done{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-edge);}
  .st.now{background:var(--m-bg);color:var(--m-deep);border:1px solid var(--m-edge);}
  .st.todo{background:var(--paper);color:var(--ink-soft);border:1px solid var(--line);}
  .lesson.exam{background:var(--gold-bg);border-color:var(--gold-edge);}
  .lesson.exam .num{color:var(--gold);}
  .lesson.exam .t{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;}

  .back{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 12px;cursor:pointer;display:inline-block;}
  .lesson-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.55rem;line-height:1.15;letter-spacing:-.3px;}
  .lesson-meta{color:var(--ink-soft);font-size:.8rem;margin:4px 0 14px;}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .tabs button{border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:.78rem;font-weight:700;color:var(--ink-soft);background:#fff;cursor:pointer;font-family:'Karla',sans-serif;}
  .tabs button.on{background:var(--m-deep);border-color:var(--m-deep);color:#fff;}
  .panel{display:none;}.panel.on{display:block;}

  .gram{background:#fff;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:12px 14px;font-size:.88rem;margin-bottom:14px;}
  .gram b{color:var(--gold);}
  .word{display:flex;align-items:baseline;gap:9px;border-bottom:1px dashed var(--line);padding:9px 2px;}
  .word .fr{font-weight:700;font-size:1rem;}
  .word .fr.m{color:var(--m-deep);} .word .fr.f{color:var(--f-deep);}
  .word .ipa{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft);flex:0 0 auto;}
  .word .en{margin-left:auto;color:var(--ink-soft);font-size:.84rem;text-align:right;}
  .gtag{font-family:'JetBrains Mono',monospace;font-size:.58rem;border-radius:4px;padding:1px 5px;flex:0 0 auto;}
  .gtag.m{background:var(--m-bg);color:var(--m-deep);} .gtag.f{background:var(--f-bg);color:var(--f-deep);}
  .spk{border:1px solid var(--m-edge);background:var(--m-bg);color:var(--m-deep);border-radius:8px;font-size:.72rem;padding:2px 8px;cursor:pointer;flex:0 0 auto;font-family:'Karla',sans-serif;}
  .spk:hover{filter:brightness(1.05);}

  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 18px rgba(35,38,43,.06);margin-bottom:14px;}
  .q{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}
  .prompt{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;margin:6px 0 14px;line-height:1.25;}
  input.txt{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:16px;text-align:center;background:#fff;font-family:'Karla',sans-serif;}
  textarea.txt{width:100%;min-height:110px;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fff;font-family:'Karla',sans-serif;line-height:1.5;}
  .newword{display:block;width:100%;margin-top:12px;background:var(--gold-bg);color:var(--gold);border:1px dashed var(--gold-edge);padding:10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;font-family:'Karla',sans-serif;}
  .row{display:flex;gap:9px;margin-top:14px;}
  .row button{flex:1;}
  button.act{border:none;background:var(--m-deep);color:#fff;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Karla',sans-serif;}
  button.act:hover{filter:brightness(1.08);}
  button.ghost{background:#fff;color:var(--m-deep);border:1px solid var(--m-deep);}
  button.goldb{background:var(--gold);}
  .feedback{margin-top:13px;text-align:center;font-weight:700;min-height:20px;font-size:.95rem;border-radius:10px;}
  .feedback.ok{color:var(--good);background:var(--good-bg);padding:9px;}
  .feedback.ko{color:var(--bad);background:var(--bad-bg);padding:9px;}
  .feedback .sub2{display:block;font-weight:400;font-size:.82rem;color:var(--ink-soft);margin-top:3px;}
  .hint{text-align:center;color:var(--ink-soft);font-size:.72rem;margin:10px 0 0;}
  .opts{display:grid;gap:9px;margin-top:6px;}
  .opt{border:1px solid var(--line);background:#fff;padding:12px;border-radius:12px;cursor:pointer;font-size:.95rem;text-align:left;font-family:'Karla',sans-serif;}
  .opt.okc{background:var(--good-bg);border-color:var(--good);color:var(--good);font-weight:700;}
  .opt.koc{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
  .genrebtns{display:flex;gap:12px;margin-top:6px;}
  .genrebtns button{flex:1;font-family:'Cormorant Garamond',serif;font-size:1.5rem;padding:15px;border-radius:14px;font-weight:600;cursor:pointer;}
  .genrebtns .un{color:var(--m-deep);border:2px solid var(--m-edge);background:var(--m-bg);}
  .genrebtns .une{color:var(--f-deep);border:2px solid var(--f-edge);background:var(--f-bg);}
  .donebtn{display:block;width:100%;margin-top:18px;background:#fff;border:1px solid var(--gold-edge);color:var(--gold);border-radius:12px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Karla',sans-serif;}
  .donebtn.is{background:var(--gold-bg);}
  .shadowtip{background:var(--gold-bg);border:1px dashed var(--gold-edge);border-radius:10px;padding:9px 12px;font-size:.8rem;color:var(--gold);text-align:center;margin-top:12px;font-weight:700;}

  /* dialogues */
  .lvlbtns{display:flex;gap:8px;margin-bottom:12px;}
  .lvlbtns button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 6px;font-size:.78rem;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:'Karla',sans-serif;}
  .lvlbtns button.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .lvlbtns button.won{border-color:var(--gold-edge);color:var(--gold);background:var(--gold-bg);}
  .bubble{max-width:88%;border-radius:14px;padding:10px 13px;margin-bottom:9px;font-size:.95rem;line-height:1.45;position:relative;}
  .bubble.a{background:#fff;border:1px solid var(--line);margin-right:auto;}
  .bubble.me{background:var(--m-bg);border:1px solid var(--m-edge);margin-left:auto;}
  .bubble .who{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:2px;}
  .bubble .entr{display:block;color:var(--ink-soft);font-size:.78rem;margin-top:3px;}
  .bubble .spk{margin-left:6px;}

  /* exam */
  .exam-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;letter-spacing:-.3px;}
  .exam-sub{color:var(--ink-soft);font-size:.8rem;margin:4px 0 14px;}
  .part{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;background:#fff;}
  .part .ph{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
  .part .pn{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--gold);border:1px solid var(--gold);border-radius:50%;width:23px;height:23px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .part .pt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.12rem;flex:1;}
  .part .pts{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft);}
  .rtext{background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:11px 13px;font-size:.9rem;margin:8px 0;font-style:italic;}
  .mcq{margin:10px 0 14px;}
  .mcq .qq{font-weight:700;font-size:.9rem;margin-bottom:6px;}
  .mcq label{display:block;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:.9rem;cursor:pointer;background:#fff;}
  .mcq label.okc{background:var(--good-bg);border-color:var(--good);color:var(--good);font-weight:700;}
  .mcq label.koc{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
  .model{background:var(--gold-bg);border:1px solid var(--gold-edge);border-radius:10px;padding:11px 13px;font-size:.88rem;margin-top:8px;display:none;}
  .model b{color:var(--gold);}
  .speakx label{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:.9rem;cursor:pointer;background:#fff;}
  .speakx input{margin-top:3px;}
  .scoreline{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:.88rem;flex-wrap:wrap;}
  .scoreline input{width:70px;padding:8px;border:1px solid var(--line);border-radius:10px;font-size:15px;text-align:center;}
  .rule{background:var(--gold-bg);border:1px solid var(--gold-edge);border-radius:12px;padding:11px 13px;font-size:.82rem;margin:4px 0 14px;}
  .rule b{color:var(--gold);}
  .result{border:2px solid var(--gold);border-radius:16px;background:#fff;padding:18px;text-align:center;margin-top:14px;}
  .result .big{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;color:var(--gold);}
  .result .det{color:var(--ink-soft);font-size:.85rem;margin-top:6px;}

  .note{background:#fff;border:1px dashed var(--gold-edge);border-radius:14px;padding:16px;font-size:.9rem;color:var(--ink-soft);}
  .link2{background:none;border:none;color:var(--gold);text-decoration:underline;cursor:pointer;font-family:'Karla',sans-serif;font-size:.85rem;padding:4px;}
  #bravo{position:fixed;inset:0;background:rgba(35,38,43,.45);display:flex;align-items:center;justify-content:center;z-index:30;padding:20px;}
  .bravo-card{background:#fff;border:2px solid var(--gold);border-radius:20px;padding:30px 24px;text-align:center;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(35,38,43,.3);}
  .bravo-card .big{font-size:3rem;line-height:1;}
  .bravo-card h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.6rem;margin:10px 0 4px;}
  .bravo-card p{color:var(--ink-soft);font-size:.9rem;margin-bottom:14px;}

  /* ---------- Mode Classe (shared class device, big screen) ---------- */
  body.classe .wrap{max-width:980px;}
  .cls-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .cls-top .x{margin-left:auto;}
  .cls-lnav{font-family:'JetBrains Mono',monospace;font-size:.72rem;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;color:var(--ink-soft);}
  .cls-lnav.big{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--ink);cursor:default;}
  .cls-slide{background:#fff;border:1px solid var(--line);border-radius:20px;padding:clamp(22px,4vw,46px);box-shadow:0 8px 30px rgba(35,38,43,.08);min-height:56vh;}
  .cls-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  .cls-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(2rem,5vw,3.2rem);line-height:1.08;letter-spacing:-.5px;}
  .cls-sub{color:var(--ink-soft);font-size:clamp(1rem,2.2vw,1.25rem);margin-top:12px;}
  .cls-word{display:flex;align-items:baseline;gap:14px;border-bottom:1px dashed var(--line);padding:12px 2px;}
  .cls-word .fr{font-weight:700;font-size:clamp(1.25rem,2.8vw,1.7rem);}
  .cls-word .fr.m{color:var(--m-deep);} .cls-word .fr.f{color:var(--f-deep);}
  .cls-word .en{margin-left:auto;color:var(--ink-soft);font-size:clamp(.95rem,2vw,1.15rem);text-align:right;}
  .cls-word .spk{font-size:.95rem;padding:4px 12px;}
  .cls-gram{font-size:clamp(1.15rem,2.6vw,1.6rem);line-height:1.7;}
  .cls-gram b{color:var(--gold);}
  .cls-bubble{max-width:82%;border-radius:16px;padding:14px 18px;margin-bottom:12px;font-size:clamp(1.05rem,2.4vw,1.4rem);line-height:1.5;}
  .cls-bubble.a{background:var(--paper);border:1px solid var(--line);margin-right:auto;}
  .cls-bubble.me{background:var(--m-bg);border:1px solid var(--m-edge);margin-left:auto;}
  .cls-bubble .who{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .cls-parler{list-style:none;}
  .cls-parler li{font-size:clamp(1.1rem,2.5vw,1.5rem);padding:14px 0 14px 44px;position:relative;border-bottom:1px dashed var(--line);line-height:1.5;}
  .cls-parler li::before{content:"🗣";position:absolute;left:0;top:12px;}
  .cls-tip{background:var(--gold-bg);border:1px dashed var(--gold-edge);border-radius:12px;padding:12px 16px;font-size:clamp(.9rem,2vw,1.05rem);color:var(--gold);font-weight:700;text-align:center;margin-top:18px;}
  .cls-nav{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:16px;}
  .cls-nav button{border:none;background:var(--m-deep);color:#fff;border-radius:12px;padding:14px 26px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Karla',sans-serif;}
  .cls-nav button:disabled{opacity:.35;cursor:default;}
  .cls-nav .cnt{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--ink-soft);min-width:70px;text-align:center;}
  .cls-dots{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
  .cls-dots span{width:9px;height:9px;border-radius:50%;background:var(--line);cursor:pointer;}
  .cls-dots span.on{background:var(--gold);}
  /* ---------- Grammaire & Conjugaison (v5) ---------- */
  .accbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center;}
  .accbar button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;font-size:16px;cursor:pointer;font-family:'Karla',sans-serif;color:var(--ink);}
  .accbar button:active{background:var(--gold-bg);}
  .stagepills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .stg{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.02em;border-radius:999px;padding:6px 11px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink-soft);}
  .stg.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .stg.done{background:var(--gold-bg);border-color:var(--gold-edge);color:var(--gold);}
  .grule{background:var(--gold-bg);border:1px solid var(--gold-edge);border-radius:12px;padding:12px 14px;font-size:.92rem;margin-bottom:14px;}
  .grule b{color:var(--gold);}
  .grule .gx{border-top:1px dashed var(--gold-edge);margin-top:9px;padding-top:9px;font-size:.9rem;line-height:1.7;}
  .grule .gx .entr{color:var(--ink-soft);font-size:.78rem;font-style:italic;}
  .grule .warn2{border-top:1px dashed var(--gold-edge);margin-top:9px;padding-top:9px;font-size:.82rem;}
  .conjtable{width:100%;border-collapse:collapse;font-size:.95rem;}
  .conjtable td{padding:5px 4px;border-bottom:1px dashed var(--line);}
  .conjtable td.pn2{color:var(--ink-soft);width:78px;font-size:.85rem;}
  .conjtable b{color:var(--gold);}
  .conjtable .spk{float:right;}
  .gchip{display:block;background:var(--gold-bg);border:1px solid var(--gold-edge);color:var(--gold);border-radius:12px;padding:9px 12px;font-size:.83rem;font-weight:700;margin:-6px 0 14px;cursor:pointer;line-height:1.4;}
  .ochips{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px;}
  .ochip{border:1px solid var(--gold-edge);background:var(--gold-bg);color:var(--gold);border-radius:10px;padding:9px 13px;font-weight:700;cursor:pointer;font-size:.95rem;font-family:'Karla',sans-serif;}
  .ochip.used{opacity:.22;pointer-events:none;}
  .obuild{border:1px dashed var(--line);border-radius:10px;margin-top:10px;padding:10px 12px;min-height:44px;font-size:1.02rem;background:#fff;}
  .verbchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .vchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;font-size:.82rem;cursor:pointer;font-family:'Karla',sans-serif;color:var(--ink);}
  .vchip.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .prodbox{background:#fff;border:1px dashed var(--gold-edge);border-radius:12px;padding:12px 14px;font-size:.86rem;margin-top:14px;}
  .prodbox b{color:var(--gold);}
  .vgrp{border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px;overflow:hidden;}
  .vgrp-h{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;font-weight:700;font-size:.9rem;}

/* ================= audio (TTS) ================= */
let VOICE=null,TTS=("speechSynthesis" in window);
function pickVoice(){
  if(!TTS)return;
  const vs=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith("fr"));
  VOICE=vs.find(v=>/fr[-_]FR/i.test(v.lang))||vs[0]||null;
}
if(TTS){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function speak(txt){
  if(!TTS){toast("No French voice on this device");return;}
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang="fr-FR";if(VOICE)u.voice=VOICE;u.rate=0.85;
    speechSynthesis.speak(u);
  }catch(e){}
}
function spkBtn(txt){return `<button class="spk" onclick="speak(this.dataset.s);event.stopPropagation()" data-s="${esc(txt).replace(/"/g,"&quot;")}">🔊</button>`;}

const $=id=>document.getElementById(id);

function loadPeople(){

}
function loadP(){
  try{P=JSON.parse(localStorage.getItem("fcl_p_"+cur)||"null");}catch(e){P=null;}
  if(!P)P={done:{},exam:{},dlg:{},weak:{},ms:{},correct:0,streak:0,last:""};
  P.dlg=P.dlg||{};P.weak=P.weak||{};P.ms=P.ms||{};
}
function saveAll(){
  localStorage.setItem("fcl_people",JSON.stringify(people));
  localStorage.setItem("fcl_cur",cur);
  localStorage.setItem("fcl_p_"+cur,JSON.stringify(P));
}
function today(){return new Date().toISOString().slice(0,10);}
function touch(){
  const t=today();
  if(P.last!==t){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    P.streak=(P.last===y)?(P.streak||0)+1:1;
    P.last=t;
  }
}
function markWeak(key){P.weak[key]=(P.weak[key]||0)+1;}
function easeWeak(key){if(P.weak[key]){P.weak[key]--;if(P.weak[key]<=0)delete P.weak[key];}}
function scoreGood(key){P.correct=(P.correct||0)+1;if(key)easeWeak(key);touch();saveAll();}
function toast(msg){const t=$("toast");t.textContent=msg;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2400);}

/* ================= helpers ================= */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pers(s){return String(s).replace(/Iris Mo/g,cur).replace(/\bIris\b/g,cur);}
function norm(s){
  return String(s).toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/œ/g,"oe").replace(/[’']/g," ")
    .replace(/[^a-z0-9 -]/g," ").replace(/-/g," ")
    .replace(/\s+/g," ").trim();
}
function stripArt(s){return norm(s).replace(/^(une|un|des|les|le|la|l) /,"");}
function art(fr){const m=fr.match(/^(une|un|les|le|la|l')\s?/i);return m?m[0].trim():"";}
function bare(fr){return fr.replace(/^(une|un|les|le|la|l')\s?/i,"");}
function pick(arr,not){
  if(!arr.length)return null;
  if(arr.length===1)return arr[0];
  let it;do{it=arr[Math.floor(Math.random()*arr.length)];}while(it===not);
  return it;
}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function lessonByN(n){return LESSONS.find(l=>l.n===n);}
function doneCount(){return LESSONS.filter(l=>P.done[l.n]).length;}
function examsPassed(){return Object.keys(P.exam||{}).filter(k=>P.exam[k]&&P.exam[k].pass).length;}
function examUnlocked(e){for(let i=e.after-4;i<=e.after;i++){if(!P.done[i])return false;}return true;}
function studiedLessons(){
  const out=LESSONS.filter(l=>l.w.length&&P.done[l.n]);
  const first=LESSONS.find(l=>!P.done[l.n]&&l.w.length);
  if(first)out.push(first);
  return out;
}

function addPerson(){
  const n=prompt("New student's first name?");
  if(n&&n.trim()){
    const nm=n.trim();
    if(people.indexOf(nm)<0)people.push(nm);
    cur=nm;loadP();saveAll();renderHome();toast("Bienvenue, "+nm+" !");

function removePerson(){
  if(people.length<2){toast("You must keep at least one name!");return;}
  const n=prompt("Which name to remove? ("+people.join(", ")+")");
  if(!n||!n.trim())return;
  const nm=n.trim();
  const idx=people.findIndex(p=>p.toLowerCase()===nm.toLowerCase());
  if(idx<0){toast("“"+nm+"” is not in the list.");return;}
  const real=people[idx];
  if(!confirm("Remove “"+real+"” and erase their progress on this device?"))return;
  people.splice(idx,1);
  localStorage.removeItem("fcl_p_"+real);
  if(cur===real){cur=people[0];loadP();}
  saveAll();renderHome();toast("“"+real+"” removed.");
}
function exportProgress(){
  let txt="LA CLASSE DE FRANÇAIS — progress of "+cur+" ("+today()+")\n";
  txt+="Lessons done: "+(LESSONS.filter(l=>P.done[l.n]).map(l=>"L"+l.n).join(", ")||"none")+"\n";
  txt+="Exams: "+(Object.keys(P.exam).map(k=>"EX"+k+" = "+P.exam[k].total+"/100"+(P.exam[k].pass?" (passed)":" (to retake)")).join(", ")||"none")+"\n";
  txt+="Difficult words: "+(Object.keys(P.weak).length? Object.keys(P.weak).map(k=>{const[a,b]=k.split(":");const L2=lessonByN(+a);return L2&&L2.w[+b]?L2.w[+b][1]:"";}).filter(Boolean).join(", ") : "none")+"\n";
  txt+="Correct answers: "+(P.correct||0)+" · Day streak: "+(P.streak||0);
  copyText(txt);
}
function backupProgress(){
  const code="FCL1."+btoa(unescape(encodeURIComponent(JSON.stringify({name:cur,p:P}))));
  copyText(code);
  toast("Backup code copied — keep it somewhere safe!");
}
function restoreProgress(){
  const code=prompt("Paste your backup code (FCL1.…):");
  if(!code)return;
  try{
    const obj=JSON.parse(decodeURIComponent(escape(atob(code.trim().replace(/^FCL1\./,"")))));
    if(!obj||!obj.p)throw 0;
    if(people.indexOf(obj.name)<0)people.push(obj.name);
    cur=obj.name;P=obj.p;P.dlg=P.dlg||{};P.weak=P.weak||{};
    saveAll();renderHome();toast(obj.name+"'s progress restored!");
  }catch(e){toast("Invalid code…");}
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("Copied!"),()=>fallbackCopy(txt));
  }else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);
  ta.select();try{document.execCommand("copy");toast("Copied!");}catch(e){toast("Copy failed.");}
  document.body.removeChild(ta);
}

/* --- mastery engine: 2 correct in a row = maîtrisé --- */
function wkey(l,w){return l.n+":"+l.w.indexOf(w);}
function wki(l,i){return l.n+":"+i;}
function mk(t,i){return t+":"+L.n+":"+i;}
function msGet(k){return P.ms[k]||0;}
function msWin(k){P.ms[k]=Math.min(2,(P.ms[k]||0)+1);saveAll();return P.ms[k]>=2;}
function msLose(k){if(P.ms[k]){P.ms[k]=0;saveAll();}}
function masteredCount(){return Object.keys(P.ms).filter(k=>k[0]==="q"&&P.ms[k]>=2).length;}
function pickIdx(pool,last){
  if(!pool.length)return -1;
  let cand=pool.filter(i=>i!==last);if(!cand.length)cand=pool;
  const weak=cand.filter(i=>P.weak[wki(L,i)]);
  if(weak.length&&Math.random()<0.5)return weak[Math.floor(Math.random()*weak.length)];
  return cand[Math.floor(Math.random()*cand.length)];
}
function resetBtn(t){return `<span class="sub2"><button class="link2" onclick="resetDrill('${t}')">↻ Restart this series</button></span>`;}
function resetDrill(t){
  if(t==="c"){const st=lessonStage();Object.keys(P.ms).forEach(k=>{if(k.indexOf("C"+st.id+":")===0)delete P.ms[k];});}
  else Object.keys(P.ms).forEach(k=>{if(k.indexOf(t+":"+L.n+":")===0)delete P.ms[k];});
  saveAll();
  if(t==="q"){const i2=$("qIn");if(i2)i2.style.display="";newQuiz();}
  else if(t==="e")newEcoute();
  else if(t==="g")newGenre();
  else if(t==="s"){const i2=$("sIn");if(i2)i2.style.display="";newSent();}
  else if(t==="c"){const i2=$("cIn");if(i2)i2.style.display="";newConj();}
}

/* --- conjugaison (v5 : étapes C1–C7, données CONJ) --- */
const IMPF_END=["ais","ais","ait","ions","iez","aient"],FUT_END=["ai","as","a","ons","ez","ont"];
const AUX_A=["ai","as","a","avons","avez","ont"];
const PCE_P=["il","elle","ils","elles"],PCE_AUX=["est","est","sont","sont"],PCE_AGR=["","e","s","es"];
const IMPE_P=["(tu)","(nous)","(vous)"];
const CONJ_HEAD={pres:"Conjugate in the présent:",impf:"Conjugate in the imparfait:",fut:"Conjugate in the futur simple:",pc:"Conjugate in the passé composé:",impe:"Give the impératif:"};
function impfForm(v,i){const c=CONJ[v];const o=typeof c.impf==="string"?{s:c.impf}:c.impf;const e=IMPF_END[i];return o.s+(e[0]==="a"?(o.soft||""):(o.hard||""))+e;}
function futForm(v,i){return CONJ[v].fut+FUT_END[i];}
function impeForms(v){const c=CONJ[v];if(c.impe)return c.impe;return [c.pres[1].replace(/es$/,"e"),c.pres[3],c.pres[4]];}
function elide(pr,form){if((pr==="je"||pr==="Je")&&/^[aeiouyhâàêéèëïîô]/i.test(form))return "j'"+form;return pr+" "+form;}
function dispPers(i){return PRON[i];}
function blocOf(n){return Math.ceil(n/5);}
function currentBloc(){const first=LESSONS.find(l=>!P.done[l.n]&&l.w.length);return blocOf(first?first.n:40);}
function stageForBloc(b){return CSTAGES[Math.min(Math.max(b,1),7)-1];}
function stageKey(st,v){return "C"+st.id+":"+v;}
function stageVerbs(st){return st.verbs.filter(v=>CONJ[v]&&!(st.tense==="impe"&&CONJ[v].noImpe));}
function stageProgress(st){const vs=stageVerbs(st);return vs.filter(v=>msGet(stageKey(st,v))>=2).length+"/"+vs.length;}
function conjQFor(v,t){
  const c=CONJ[v];
  if(t==="pres"||t==="impf"||t==="fut"){
    const i=Math.floor(Math.random()*6);
    const form=t==="pres"?c.pres[i]:(t==="impf"?impfForm(v,i):futForm(v,i));
    const pr=i===0?"je":PRON[i].split(" / ")[0];
    return {v:v,t:t,label:`${esc(v)} — <i>${PRON[i]}</i> ______`,accept:[form],disp:elide(i===0?"je":PRON[i],form),say:elide(pr,form)};
  }
  if(t==="pc"&&c.aux==="a"){
    const i=Math.floor(Math.random()*6);
    const form=AUX_A[i]+" "+c.pp;
    const pr=i===0?"je":PRON[i].split(" / ")[0];
    return {v:v,t:t,label:`${esc(v)} — <i>${PRON[i]}</i> ______ <span style="color:var(--ink-soft);font-size:.8em;">(passé composé)</span>`,accept:[form],disp:elide(i===0?"je":PRON[i],form),say:elide(pr,form)};
  }
  if(t==="pc"){
    const pi=Math.floor(Math.random()*4);
    const form=PCE_AUX[pi]+" "+c.pp+PCE_AGR[pi];
    return {v:v,t:t,label:`${esc(v)} — <i>${PCE_P[pi]}</i> ______ <span style="color:var(--ink-soft);font-size:.8em;">(passé composé — accord !)</span>`,accept:[form],disp:PCE_P[pi]+" "+form,say:PCE_P[pi]+" "+form};
  }
  const pi=Math.floor(Math.random()*3);
  const form=impeForms(v)[pi];
  return {v:v,t:t,label:`${esc(v)} — impératif <i>${IMPE_P[pi]}</i> ______`,accept:[form],disp:form+" !",say:form+" !"};
}
function conjQ(st,v){const q=conjQFor(v,st.tense);q.st=st;return q;}
function conjRows(v,tense){
  const c=CONJ[v];
  if(tense==="pres")return c.pres.map((f2,i)=>({p:PRON[i],f:f2}));
  if(tense==="impf")return IMPF_END.map((e,i)=>({p:PRON[i],f:impfForm(v,i)}));
  if(tense==="fut")return FUT_END.map((e,i)=>({p:PRON[i],f:futForm(v,i)}));
  if(tense==="pc"&&c.aux==="a")return AUX_A.map((a,i)=>({p:PRON[i],f:a+" "+c.pp}));
  if(tense==="pc")return [["je","suis",""],["tu","es",""],["il","est",""],["elle","est","e"],["nous","sommes","(e)s"],["vous","êtes","(e)(s)"],["ils","sont","s"],["elles","sont","es"]].map(r=>({p:r[0],f:r[1]+" "+c.pp+(r[0]==="je"||r[0]==="tu"?"(e)":r[2])}));
  return impeForms(v).map((f2,i)=>({p:IMPE_P[i],f:f2+" !"}));
}
function chartHtml(v,tense,title){
  const rows=conjRows(v,tense);
  let h=`<div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:10px 0 4px;">${esc(title||v)}</div><table class="conjtable">`;
  rows.forEach(r=>{
    const say=elide(r.p.split(" / ")[0].replace(/[()]/g,""),r.f.replace(/\([^)]*\)/g,""));
    h+=`<tr><td class="pn2">${esc(r.p)}</td><td><b>${esc(r.f)}</b>${spkBtn(say)}</td></tr>`;
  });
  return h+`</table>`;
}
function accBar(id){
  return `<div class="accbar">${["é","è","ê","à","ç","ô","î","û","ï","'"].map(a=>`<button type="button" onclick="accIns('${id}','${a==="'"?"\\'":a}')">${a}</button>`).join("")}</div>`;
}
function accIns(id,ch){
  const el=$(id);if(!el)return;
  const s=el.selectionStart??el.value.length,e=el.selectionEnd??el.value.length;
  el.value=el.value.slice(0,s)+ch+el.value.slice(e);
  el.focus();el.selectionStart=el.selectionEnd=s+1;
}
/* drill de leçon : suit l'étape du bloc de la leçon */
let CQ=null;
function lessonStage(){return stageForBloc(blocOf(L.n));}
function newConj(){
  const st=lessonStage();

  const f=$("cFb");
  const hd=$("cHead");if(hd)hd.textContent=`Stage C${st.id} · ${CONJ_HEAD[st.tense]}`;

}
function checkConj(){
  if(!CQ)return;const inp=$("cIn").value;if(!inp.trim())return;
  const f=$("cFb");
  const cleaned=norm(inp).replace(/^(je|j|tu|il|elle|on|nous|vous|ils|elles) /,"");
  if(CQ.accept.some(a=>norm(a)===cleaned||norm(a)===norm(inp))){
    const mastered=msWin(stageKey(CQ.st,CQ.v));
    f.className="feedback ok";f.innerHTML=`✓ Bravo ! <b>${esc(CQ.disp)}</b> ${spkBtn(CQ.say)}${mastered?" 🏆":""}`;
    if(mastered)masteredToast();
    scoreGood();setTimeout(newConj,1500);
  }else{
    f.className="feedback ko";f.innerHTML=`✗ We say: <b>${esc(CQ.disp)}</b> ${spkBtn(CQ.say)}`;
    msLose(stageKey(CQ.st,CQ.v));
  }
}
function explainConj(){
  if(!CQ)return;const f=$("cFb");
  const rows=conjRows(CQ.v,CQ.st.tense);
  f.className="feedback ok";
  f.innerHTML=`<b>${esc(CQ.v)}</b> : ${rows.map(r=>`${esc(r.p.split(" / ")[0])} <b>${esc(r.f)}</b>`).join(" · ")}`;
  msLose(stageKey(CQ.st,CQ.v));
}

/* --- dialogue (3 niveaux) --- */
let dLvl=1,dStep=0,dErr=0;
function renderDlgEntry(){
  const won=P.dlg[L.n]||0;
  if(won>=3)renderDlgDone();else renderDlg(Math.min(won+1,3));
}
function renderDlgDone(){
  $("dlgBox").innerHTML=`<div class="card" style="text-align:center;">
    <div class="q">Scene: ${esc(pers(L.d.t))}</div>
    <div class="prompt" style="font-size:1.35rem;">✓ Dialogue mastered at all 3 levels — bravo!</div>
    <div class="row"><button class="act ghost" onclick="renderDlg(1)">Replay ①</button>
    <button class="act ghost" onclick="renderDlg(2)">Replay ②</button>
    <button class="act ghost" onclick="renderDlg(3)">Replay ③</button></div>
  </div>`;
}
function dlgRecord(lvl){
  const before=P.dlg[L.n]||0;
  P.dlg[L.n]=Math.max(before,lvl);
  touch();saveAll();
  const b=$("tb_dlg");
  if(b&&P.dlg[L.n]>=3&&b.textContent.indexOf("✓")<0)b.textContent="Dialogue ✓";
}
function renderDlg(lvl){
  dLvl=lvl;dStep=0;dErr=0;
  const won=P.dlg[L.n]||0;
  let h=`<div class="card">
    <div class="q">Scene: ${esc(pers(L.d.t))} — YOU are the blue side</div>
    <div class="lvlbtns">
      <button class="${dLvl===1?"on":(won>=1?"won":"")}" onclick="renderDlg(1)">① Listen &amp; read</button>
      <button class="${dLvl===2?"on":(won>=2?"won":"")}" onclick="renderDlg(2)">② Choose your line</button>
      <button class="${dLvl===3?"on":(won>=3?"won":"")}" onclick="renderDlg(3)">③ Speak yourself</button>
    </div>
    <div id="dlgArea"></div>
  </div>`;
  $("dlgBox").innerHTML=h;
  if(dLvl===1)dlgLevel1();else dlgNextStep();
}
function bubble(line,withEn){
  const me=line[0]==="M";
  return `<div class="bubble ${me?"me":"a"}"><span class="who">${me?"— you —":"— the other —"}</span>${esc(pers(line[1]))} ${spkBtn(pers(line[1]))}${withEn?`<span class="entr">${esc(pers(line[2]))}</span>`:""}</div>`;
}
function dlgLevel1(){
  let h=L.d.lines.map(l=>bubble(l,true)).join("");
  h+=`<div class="shadowtip">🗣 Listen to each bubble (🔊) and repeat it out loud — especially the blue ones!</div>
  <div class="row"><button class="act ghost" onclick="playAllDlg()">▶ Play the whole scene</button>
  <button class="act goldb" onclick="dlgWin(1)">Level ① done ✓</button></div>`;
  $("dlgArea").innerHTML=h;
}
function playAllDlg(){
  if(!TTS){toast("No French voice on this device");return;}
  speechSynthesis.cancel();
  L.d.lines.forEach(l=>{
    const u=new SpeechSynthesisUtterance(pers(l[1]));
    u.lang="fr-FR";if(VOICE)u.voice=VOICE;u.rate=0.8;
    speechSynthesis.speak(u);
  });
}
function dlgNextStep(){
  const lines=L.d.lines;
  if(dStep>=lines.length){
    const ok=dErr===0;
    if(ok&&dLvl>1)dlgRecord(dLvl);
    $("dlgArea").innerHTML=(ok?`<div class="feedback ok" style="margin-top:4px;">🎉 Whole scene with no mistakes — level ${dLvl===2?"②":"③"} passed ✓</div>`:`<div class="feedback ok" style="margin-top:4px;">Scene finished! (${dErr} help${dErr>1?"s":""}) — do it again to pass with no mistakes.</div>`)+
      `<div class="row"><button class="act" onclick="renderDlg(${dLvl})">↻ Try again</button>${ok?`<button class="act goldb" onclick="dlgWin(${dLvl})">Continue →</button>`:""}</div>`;
    return;
  }
  const line=lines[dStep];
  let h=lines.slice(0,dStep).map(l=>bubble(l,false)).join("");
  if(line[0]==="A"){
    h+=bubble(line,false);
    $("dlgArea").innerHTML=h+`<div class="row"><button class="act ghost" onclick="dStep++;dlgNextStep()">Continue →</button></div>`;
    speak(pers(line[1]));
  }else{
    if(dLvl===2){
      const others=shuffle(L.d.lines.filter(l=>l[0]==="M"&&l!==line).map(l=>pers(l[1])).concat(GEN_DIST)).slice(0,2);
      const opts=shuffle([pers(line[1])].concat(others));
      h+=`<div class="bubble me"><span class="who">— you — (choose your line: “${esc(pers(line[2]))}”)</span>
        <div class="opts">${opts.map(o=>`<div class="opt" onclick="dlgPick(this,${o===pers(line[1])})">${esc(o)}</div>`).join("")}</div></div>`;
      $("dlgArea").innerHTML=h;
    }else{
      h+=`<div class="bubble me"><span class="who">— you — say it in French: “${esc(pers(line[2]))}”</span>
        <input class="txt" id="dIn" placeholder="write your line…" autocomplete="off" onkeydown="if(event.key==='Enter')dlgType()">
        <div class="row"><button class="act" onclick="dlgType()">Check</button>
        <button class="act ghost" onclick="dlgHelp()">🤔 help</button></div>
        <div class="feedback" id="dFb"></div></div>`;
      $("dlgArea").innerHTML=h;
      const inp=$("dIn");if(inp)inp.focus();
    }
  }
}
function dlgPick(el,ok){
  const line=L.d.lines[dStep];
  if(ok){
    el.classList.add("okc");speak(pers(line[1]));scoreGood();
    setTimeout(()=>{dStep++;dlgNextStep();},1100);
  }else{
    el.classList.add("koc");dErr++;
  }
}
function dlgType(){
  const line=L.d.lines[dStep];
  const inp=$("dIn").value;if(!inp.trim())return;
  const f=$("dFb");
  if(norm(inp)===norm(pers(line[1]))){
    f.className="feedback ok";f.innerHTML="✓ Parfait !";
    speak(pers(line[1]));scoreGood();
    setTimeout(()=>{dStep++;dlgNextStep();},1100);
  }else{
    f.className="feedback ko";f.innerHTML=`Not quite. Model: <b>${esc(pers(line[1]))}</b>`;
    dErr++;
  }
}
function dlgHelp(){
  const line=L.d.lines[dStep];
  const f=$("dFb");f.className="feedback ok";f.innerHTML=`<b>${esc(pers(line[1]))}</b> ${spkBtn(pers(line[1]))}`;
  dErr++;
}
function dlgWin(lvl){
  dlgRecord(lvl);
  if(lvl>=3){toast("🎉 Dialogue mastered at all 3 levels!");renderDlgDone();}
  else{toast("Level "+lvl+" passed — on to level "+(lvl+1)+"!");renderDlg(lvl+1);}
}

/* ================= GRAMMAIRE (G-unités) ================= */
function gKey(n,i){return "G:"+n+":"+i;}
function gMastered(g){return g.exs?g.exs.filter((x,i)=>msGet(gKey(g.n,i))>=2).length:0;}
function gIsDone(g){return g.ready&&g.exs&&gMastered(g)>=g.exs.length;}
function openGramHome(){
  let h=`<span class="back" onclick="renderHome()">← Home</span>
  <div class="lesson-title">📐 Grammar</div>
  <div class="lesson-meta">Merged programme from the 3 Grammaire Progressive books · 2 units per block of 5 lessons (see class-plan.md)</div>`;
  let lastBloc=0;
  GUNITS.forEach(g=>{
    if(g.bloc!==lastBloc){lastBloc=g.bloc;
      const st=stageForBloc(g.bloc);

function gAnsO(){

/* ================= révision mixte ================= */
let RV=null;
function startReview(){
  const pool=studiedLessons();
  if(!pool.length){toast("Start a lesson first!");return;}
  RV={i:0,ok:0,qs:[]};
  for(let k=0;k<20;k++){
    let li,wi=null;
    const weakKeys=Object.keys(P.weak);
    if(weakKeys.length&&Math.random()<0.5){
      const wk=weakKeys[Math.floor(Math.random()*weakKeys.length)].split(":");
      const l2=lessonByN(+wk[0]);
      if(l2&&l2.w[+wk[1]]){li=l2;wi=+wk[1];}
    }
    if(!li){li=pool[Math.floor(Math.random()*pool.length)];}
    const gReady=GUNITS.filter(g2=>g2.ready&&g2.bloc<=currentBloc());
    const types=["quiz","ecoute","genre","conj"].concat(gReady.length?["gram","gram"]:[]);
    let ty=types[Math.floor(Math.random()*types.length)];
    if(ty==="ecoute"&&!TTS)ty="quiz";
    if(ty==="genre"){
      const gp=li.w.filter(w=>w[3]&&/^(un|une|le|la|l')/i.test(w[1])&&!/^les /i.test(w[1]));
      if(!gp.length)ty="quiz";
    }
    RV.qs.push({ty:ty,l:li,wi:wi,g:ty==="gram"?gReady[Math.floor(Math.random()*gReady.length)]:null});
  }
  reviewStep();
}
function reviewStep(){
  if(RV.i>=RV.qs.length){
    $("app").innerHTML=`
    <span class="back" onclick="renderHome()">← Home</span>
    <div class="card" style="text-align:center;">
      <div class="prompt">Review finished!</div>
      <div class="result"><div class="big">${RV.ok}/20</div>
      <div class="det">${RV.ok>=16?"Excellent! 🎉":RV.ok>=10?"Good — keep going tomorrow!":"The difficult words will come back — courage!"}</div></div>
      <div class="row"><button class="act" onclick="startReview()">↻ Another 20</button><button class="act ghost" onclick="renderHome()">Home</button></div>
    </div>`;
    return;
  }
  const q=RV.qs[RV.i];
  const l2=q.l;
  const w=(q.wi!=null&&l2.w[q.wi])?l2.w[q.wi]:l2.w[Math.floor(Math.random()*l2.w.length)];
  let inner="";
  if(q.ty==="quiz"){
    inner=`<div class="q">Leçon ${l2.n} · Write the French:</div>
    <div class="prompt">${esc(w[0])}</div>
    <input class="txt" id="rIn" autocomplete="off" onkeydown="if(event.key==='Enter')revCheck()">
    <div class="feedback" id="rFb"></div>
    <div class="row"><button class="act" onclick="revCheck()">Check</button><button class="act ghost" onclick="revSkip()">I don't know</button></div>`;
    RV.cur={w:w,l:l2,mode:"quiz"};
  }else if(q.ty==="ecoute"){
    const others=shuffle(l2.w.filter(x=>x!==w)).slice(0,2);
    const opts=shuffle([w].concat(others));
    inner=`<div class="q">Leçon ${l2.n} · Listen and choose:</div>
    <div class="prompt" style="font-size:1.2rem;">🎧 <button class="act ghost" style="padding:8px 18px;font-size:14px;" onclick="speak('${esc(w[1]).replace(/'/g,"\\'")}')">▶ Listen</button></div>
    <div class="opts">${opts.map(o=>`<div class="opt" onclick="revPick(this,${o===w})">${esc(o[0])}</div>`).join("")}</div>
    <div class="feedback" id="rFb"></div>`;
    RV.cur={w:w,l:l2,mode:"ecoute"};
    setTimeout(()=>speak(w[1]),300);
  }else if(q.ty==="genre"){
    const gp=l2.w.filter(x=>x[3]&&/^(un|une|le|la|l')/i.test(x[1])&&!/^les /i.test(x[1]));
    const gw2=gp[Math.floor(Math.random()*gp.length)];
    inner=`<div class="q">Leçon ${l2.n} · Masculine or feminine?</div>
    <div class="prompt">${esc(bare(gw2[1]))}</div>
    <div class="genrebtns"><button class="un" onclick="revGenre('m')">un</button><button class="une" onclick="revGenre('f')">une</button></div>
    <div class="feedback" id="rFb"></div>`;
    RV.cur={w:gw2,l:l2,mode:"genre"};
  }else if(q.ty==="gram"){
    const g=q.g;
    const cand=g.exs.map((x,i)=>i).filter(i=>g.exs[i].ty!=="o");
    const xi=cand[Math.floor(Math.random()*cand.length)];
    const x=g.exs[xi];
    if(x.ty==="c"){
      inner=`<div class="q">G${g.n} · ${esc(g.t)} — choose:</div>
      <div class="prompt" style="font-size:1.2rem;">${esc(pers(x.q))}</div>
      <div class="opts">${shuffle(x.opts.map((o,oi)=>oi)).map(oi=>`<div class="opt" onclick="revGramC(this,${oi})">${esc(x.opts[oi])}</div>`).join("")}</div>
      <div class="feedback" id="rFb"></div>`;
    }else{
      inner=`<div class="q">G${g.n} · ${esc(g.t)} — ${x.ty==="f"?"fill in:":"transform:"}</div>
      <div class="prompt" style="font-size:1.15rem;">${esc(pers(x.q))}</div>
      <input class="txt" id="rIn" autocomplete="off" onkeydown="if(event.key==='Enter')revGramF()">
      ${accBar("rIn")}
      <div class="feedback" id="rFb"></div>
      <div class="row"><button class="act" onclick="revGramF()">Check</button><button class="act ghost" onclick="revSkip()">I don't know</button></div>`;
    }
    RV.cur={g:g,xi:xi,x:x,mode:"gram"};
  }else{
    const st2=stageForBloc(blocOf(l2.n));
    const vs=stageVerbs(st2);
    const cq=conjQ(st2,vs[Math.floor(Math.random()*vs.length)]);
    inner=`<div class="q">Stage C${st2.id} · ${esc(CONJ_HEAD[st2.tense])}</div>
    <div class="prompt">${cq.label}</div>
    <input class="txt" id="rIn" autocomplete="off" onkeydown="if(event.key==='Enter')revConj()">
    ${accBar("rIn")}
    <div class="feedback" id="rFb"></div>
    <div class="row"><button class="act" onclick="revConj()">Check</button><button class="act ghost" onclick="revSkip()">I don't know</button></div>`;
    RV.cur={cq:cq,l:l2,mode:"conj"};
  }
  $("app").innerHTML=`
  <span class="back" onclick="renderHome()">← Quit review</span>
  <div class="lesson-title">Mixed review — ${RV.i+1}/20</div>
  <div class="lesson-meta">Score: ${RV.ok} ✓</div>
  <div class="card">${inner}</div>`;
  window.scrollTo(0,0);
}
function revNext(good){
  if(good)RV.ok++;
  RV.i++;
  setTimeout(reviewStep,1300);
}
function revCheck(){
  const c=RV.cur,inp=$("rIn").value;if(!inp.trim())return;
  const f=$("rFb");
  const ok=norm(inp)===norm(c.w[1])||stripArt(inp)===stripArt(c.w[1]);
  if(ok){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.w[1])}</b>`;scoreGood(wkey(c.l,c.w));revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(c.w[1])}</b>`;markWeak(wkey(c.l,c.w));saveAll();revNext(false);}
}
function revSkip(){
  const c=RV.cur,f=$("rFb");
  if(c.mode==="conj"){f.className="feedback ko";f.innerHTML=`Answer: <b>${esc(c.cq.disp)}</b>`;}
  else if(c.mode==="gram"){f.className="feedback ko";f.innerHTML=`Answer: <b>${esc(pers(c.x.show||c.x.opts[c.x.a]))}</b>`;}
  else{f.className="feedback ko";f.innerHTML=`Answer: <b>${esc(c.w[1])}</b>`;markWeak(wkey(c.l,c.w));saveAll();}
  revNext(false);
}
function revGramC(el,oi){
  const c=RV.cur,f=$("rFb");
  if(oi===c.x.a){el.classList.add("okc");f.className="feedback ok";f.innerHTML=`✓ <b>${esc(pers(c.x.show||c.x.opts[c.x.a]))}</b>`;scoreGood();revNext(true);}
  else{el.classList.add("koc");f.className="feedback ko";f.innerHTML=`✗ Answer: <b>${esc(pers(c.x.show||c.x.opts[c.x.a]))}</b>`;msLose(gKey(c.g.n,c.xi));revNext(false);}
}
function revGramF(){
  const c=RV.cur,inp=$("rIn").value;if(!inp.trim())return;
  const f=$("rFb");
  if(c.x.a.some(a=>norm(pers(a))===norm(inp))){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(pers(c.x.show||""))}</b>`;scoreGood();revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(pers(c.x.show||c.x.a[0]))}</b>`;msLose(gKey(c.g.n,c.xi));revNext(false);}
}
function revPick(el,ok){
  const c=RV.cur,f=$("rFb");
  if(ok){el.classList.add("okc");f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.w[1])}</b> = ${esc(c.w[0])}`;scoreGood(wkey(c.l,c.w));revNext(true);}
  else{el.classList.add("koc");f.className="feedback ko";f.innerHTML=`✗ C'était <b>${esc(c.w[1])}</b> = ${esc(c.w[0])}`;markWeak(wkey(c.l,c.w));saveAll();revNext(false);}
}
function revGenre(g){
  const c=RV.cur,f=$("rFb");
  if(g===c.w[3]){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.w[1])}</b>`;scoreGood(wkey(c.l,c.w));revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(c.w[1])}</b> (${c.w[3]})`;markWeak(wkey(c.l,c.w));saveAll();revNext(false);}
}
function revConj(){
  const c=RV.cur,inp=$("rIn").value;if(!inp.trim())return;
  const f=$("rFb");
  const cleaned=norm(inp).replace(/^(je|j|tu|il|elle|on|nous|vous|ils|elles) /,"");
  if(c.cq.accept.some(a=>norm(a)===cleaned||norm(a)===norm(inp))){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.cq.disp)}</b>`;scoreGood();revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(c.cq.disp)}</b>`;revNext(false);}
}

function gradeMcq(prefix,docs,fbId){
  const qs=[];docs.forEach(d=>d.qs.forEach(q=>qs.push(q)));
  let corr=0;
  qs.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="${prefix}${i}"]:checked`);
    q.o.forEach((o,oi)=>{
      const lab=$(`${prefix}_${i}_${oi}`);
      if(!lab)return;
      lab.classList.remove("okc","koc");
      if(oi===q.c)lab.classList.add("okc");
      else if(sel&&+sel.value===oi)lab.classList.add("koc");
    });
    if(sel&&+sel.value===q.c)corr++;
  });
  const score=Math.round(25*corr/qs.length);
  const f=$(fbId);f.className="feedback "+(score>=13?"ok":"ko");
  f.textContent=`${corr}/${qs.length} correct → ${score}/25`;
  return score;
}
function gradeListen(){lScore=gradeMcq("lq",E.listen,"lFb");}
function gradeReading(){rScore=gradeMcq("rq",E.read,"rFb2");}
function showModels(){E.write.forEach((w,wi)=>{$("wm_"+wi).style.display="block";});}
function copyWriting(){
  let txt="EXAM "+E.n+" — writing by "+cur+" ("+today()+")\n";

  copyText(txt);
}

let CLS={n:parseInt(localStorage.getItem("fclc_pos")||"1",10)||1,slide:0,on:false,slides:[],mode:"l",gslide:0,gslides:[]};
function clsSaveState(){localStorage.setItem("fclc_pos",String(CLS.n));}
function buildSlides(l){
  const slides=[{ty:"title"}];
  for(let i=0;i<l.w.length;i+=8)slides.push({ty:"mots",from:i,to:Math.min(i+8,l.w.length)});
  if(l.g)slides.push({ty:"gram"});
  if(l.d)slides.push({ty:"dlg"});
  if(PARLER[l.n]||l.x.length)slides.push({ty:"parler"});
  slides.push({ty:"devoirs"});
  return slides;
}
function buildGSlides(bloc){
  const gs=GUNITS.filter(g=>g.bloc===bloc&&g.ready);
  if(!gs.length)return [{ty:"g_none",bloc:bloc}];
  const slides=[];
  gs.forEach(g=>{
    slides.push({ty:"g_title",g:g});
    slides.push({ty:"g_rule",g:g});
    slides.push({ty:"g_ex",g:g});
    slides.push({ty:"g_avous",g:g});
  });
  return slides;
}
function openClasse(){
  CLS.on=true;CLS.mode="l";document.body.classList.add("classe");
  const l=lessonByN(CLS.n);
  CLS.slides=l.w.length?buildSlides(l):[];
  CLS.gslides=buildGSlides(blocOf(CLS.n));
  if(CLS.slide>=CLS.slides.length)CLS.slide=0;
  renderClasse();
}
function quitClasse(){CLS.on=false;document.body.classList.remove("classe");if(TTS)speechSynthesis.cancel();renderHome();}
function clsLesson(delta){
  const nn=CLS.n+delta;
  if(nn<1||nn>40)return;
  CLS.n=nn;CLS.slide=0;CLS.gslide=0;clsSaveState();
  const l=lessonByN(CLS.n);
  CLS.slides=l.w.length?buildSlides(l):[];
  CLS.gslides=buildGSlides(blocOf(CLS.n));
  renderClasse();
}
function clsGramToggle(){
  CLS.mode=CLS.mode==="g"?"l":"g";
  if(CLS.mode==="g"&&CLS.gslide>=CLS.gslides.length)CLS.gslide=0;
  renderClasse();
}
function clsGo(delta){
  const deck=CLS.mode==="g"?CLS.gslides:CLS.slides;
  const cur=CLS.mode==="g"?CLS.gslide:CLS.slide;
  const ns=cur+delta;
  if(ns<0||ns>=deck.length)return;
  if(CLS.mode==="g")CLS.gslide=ns;else CLS.slide=ns;
  renderClasse();
}
function clsJump(i){if(CLS.mode==="g")CLS.gslide=i;else CLS.slide=i;renderClasse();}
let PLGEN=0;
function playList(texts){
  if(!TTS){toast("Pas de voix française sur cet appareil");return;}
  const gen=++PLGEN;
  speechSynthesis.cancel();
  const step=i=>{
    if(gen!==PLGEN||i>=texts.length||!CLS.on)return;
    const u=new SpeechSynthesisUtterance(texts[i]);
    u.lang="fr-FR";if(VOICE)u.voice=VOICE;u.rate=0.72;
    u.onend=()=>setTimeout(()=>step(i+1),850);
    speechSynthesis.speak(u);
  };
  step(0);
}
function clsPlaySlide(){
  const l=lessonByN(CLS.n),s=CLS.slides[CLS.slide];
  if(s.ty==="mots")playList(l.w.slice(s.from,s.to).map(w=>w[1]));
  else if(s.ty==="dlg")playList(l.d.lines.map(x=>x[1]));
}

  PLGEN++;if(TTS)speechSynthesis.cancel();
  const l=lessonByN(CLS.n);

  let top=`<div class="cls-top">

    <span class="cls-lnav big">Leçon ${l.n} — ${esc(l.t)}</span>
    <button class="cls-lnav" onclick="clsLesson(1)">next lesson ›</button>
    <button class="cls-lnav" style="${CLS.mode==="g"?"background:var(--gold);border-color:var(--gold);color:#fff;":"color:var(--gold);border-color:var(--gold-edge);background:var(--gold-bg);"}" onclick="clsGramToggle()">${CLS.mode==="g"?"← back to the lesson":"📐 block "+blc+" grammar"}</button>
    <button class="cls-lnav x" onclick="quitClasse()">✕ quit</button>
  </div>`;
  if(CLS.mode==="g"){
    const s=CLS.gslides[CLS.gslide];
    let body="";
    if(s.ty==="g_none"){
      body=`<div style="text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:50vh;">
        <div class="cls-eyebrow">Grammar · block ${s.bloc}</div>
        <div class="cls-title">To prepare</div>
        <div class="cls-sub">The grammar units for block ${s.bloc} aren't loaded yet.<br>Tell the tutor: <b>“Prépare G${s.bloc*2-1}”</b>.</div>
      </div>`;
    }else if(s.ty==="g_title"){
      body=`<div style="text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:50vh;">
        <div class="cls-eyebrow">Block ${s.g.bloc} grammar</div>
        <div class="cls-title">G${s.g.n}<br>${esc(s.g.t)}</div>
        <div class="cls-sub">${esc(s.g.s)}<br><span style="font-size:.8em;">${esc(s.g.src)}</span></div>
      </div>`;
    }else if(s.ty==="g_rule"){
      body=`<div class="cls-eyebrow">G${s.g.n} · The rule</div>
      <div class="cls-gram">${s.g.rule.f}</div>
      ${s.g.rule.warn?`<div class="cls-tip" style="text-align:left;">${s.g.rule.warn}</div>`:""}`;
    }else if(s.ty==="g_ex"){
      body=`<div class="cls-eyebrow">G${s.g.n} · The examples — listen and repeat together!</div>`;
      s.g.rule.ex.forEach(x=>{
        body+=`<div class="cls-word"><span class="fr">${esc(x[0])}</span>${spkBtn(x[0])}<span class="en">${esc(x[1])}</span></div>`;
      });
      body+=`<div class="cls-nav" style="justify-content:flex-start;"><button onclick="playList(GUNITS.find(g=>g.n===${s.g.n}).rule.ex.map(x=>x[0]))">▶ Play all — the class repeats</button></div>`;
    }else{
      body=`<div class="cls-eyebrow">G${s.g.n} · Your turn! — speaking &amp; writing</div>
      <ul class="cls-parler">
        <li>Everyone makes up <b>one sentence</b> with today's rule — out loud. The teachers correct.</li>
        <li>✍️ ${esc(s.g.prod)}</li>
        <li>Everyone reads their writing — the class listens and corrects together.</li>
      </ul>
      <div class="cls-tip">In the app at home: 📐 Grammar → G${s.g.n} (the ${s.g.exs.length} exercises).</div>`;
    }
    const dots=CLS.gslides.map((x,i)=>`<span class="${i===CLS.gslide?"on":""}" onclick="clsJump(${i})"></span>`).join("");
    $("app").innerHTML=top+`<div class="cls-slide">${body}</div>
    <div class="cls-nav">
      <button onclick="clsGo(-1)" ${CLS.gslide===0?"disabled":""}>◀</button>
      <span class="cnt">${CLS.gslide+1} / ${CLS.gslides.length}</span>
      <button onclick="clsGo(1)" ${CLS.gslide===CLS.gslides.length-1?"disabled":""}>▶</button>
    </div>
    <div class="cls-dots">${dots}</div>
    <p class="hint">Block ${blc} grammar slideshow · arrow keys ← → · “back to the lesson” to resume</p>`;
    window.scrollTo(0,0);return;
  }
  if(!l.w.length){
    $("app").innerHTML=top+`<div class="cls-slide" style="display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center;max-width:34em;">
        <div class="cls-eyebrow">${esc(BOOKS[l.b])} · ${esc(l.ch)}</div>
        <div class="cls-title">Leçon ${l.n} — ${esc(l.t)}</div>
        <div class="cls-sub">📚 This lesson isn't loaded in the app yet.<br>
        Use the paper book (${esc(l.ch)}) and tell the tutor: <b>“Prépare la leçon ${l.n}”</b>.</div>
      </div></div>`;
    window.scrollTo(0,0);return;
  }
  const s=CLS.slides[CLS.slide];
  let body="";
  if(s.ty==="title"){
    body=`<div style="text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:50vh;">
      <div class="cls-eyebrow">Class Mode · ${esc(BOOKS[l.b])} · ${esc(l.ch)}</div>
      <div class="cls-title">Leçon ${l.n}<br>${esc(l.t)}</div>
      <div class="cls-sub">${esc(l.s)} · ${l.w.length} words</div>
    </div>`;
  }else if(s.ty==="mots"){
    body=`<div class="cls-eyebrow">The words · ${s.from+1}–${s.to} / ${l.w.length} — listen and repeat together!</div>`;
    l.w.slice(s.from,s.to).forEach(w=>{
      body+=`<div class="cls-word"><span class="fr ${w[3]}">${esc(w[1])}</span>${w[3]?`<span class="gtag ${w[3]}">${w[3]}</span>`:""}${spkBtn(w[1])}<span class="en">${esc(w[0])}</span></div>`;
    });
    body+=`<div class="cls-nav" style="justify-content:flex-start;"><button onclick="clsPlaySlide()">▶ Play all — the class repeats</button></div>`;
  }else if(s.ty==="gram"){
    body=`<div class="cls-eyebrow">Grammar note</div><div class="cls-gram">${l.g}</div>`;
  }else if(s.ty==="dlg"){
    body=`<div class="cls-eyebrow">The dialogue · ${esc(l.d.t)}</div>`;
    l.d.lines.forEach(x=>{
      const me=x[0]==="M";
      body+=`<div class="cls-bubble ${me?"me":"a"}"><span class="who">${me?"— student —":"— the other —"}</span>${esc(x[1])} ${spkBtn(x[1])}</div>`;
    });
    body+=`<div class="cls-nav" style="justify-content:flex-start;"><button onclick="clsPlaySlide()">▶ The whole scene</button></div>
    <div class="cls-tip">🎭 Now act the scene out in pairs — then change the details (names, numbers…)!</div>`;
  }else if(s.ty==="parler"){
    const prompts=PARLER[l.n]||l.x.slice(0,3).map(x2=>"Say it in French: “"+x2[0]+"”");
    body=`<div class="cls-eyebrow">Your turn to speak! — activities led by the teachers</div>
    <ul class="cls-parler">${prompts.map(p2=>`<li>${esc(p2)}</li>`).join("")}</ul>
    <div class="cls-tip">Everyone speaks — the teachers correct pronunciation. No stress, we're learning!</div>`;
  }else{
    const gsB=GUNITS.filter(g=>g.bloc===blc&&g.ready);
    const stB2=stageForBloc(blc);
    body=`<div class="cls-eyebrow">Homework — before the next class</div>
    <ul class="cls-parler">
      <li>📖 The book: re-read ${esc(l.ch)} and do the right-hand-page exercises (on paper).</li>
      <li>📱 The app, on YOUR phone: Quiz + Listening + Gender + Conjugation for leçon ${l.n}, and the Dialogue up to level ③.</li>
      ${gsB.length?`<li>📐 Grammar: the exercises of ${gsB.map(g=>"G"+g.n).join(" and ")} + stage C${stB2.id} (${esc(stB2.t)}).</li>`:""}
      ${gsB.length?`<li>✍️ Writing task (on paper, hand it to the teachers): ${esc(gsB[0].prod)}</li>`:""}
      <li>🔁 One Mixed review (10 questions) every day.</li>
    </ul>
    <div class="cls-tip">Fast learners can get ahead on the next lesson — the class itself moves at the teachers' pace!</div>`;
  }
  const dots=CLS.slides.map((x,i)=>`<span class="${i===CLS.slide?"on":""}" onclick="clsJump(${i})"></span>`).join("");
  $("app").innerHTML=top+`<div class="cls-slide">${body}</div>
  <div class="cls-nav">
    <button onclick="clsGo(-1)" ${CLS.slide===0?"disabled":""}>◀</button>
    <span class="cnt">${CLS.slide+1} / ${CLS.slides.length}</span>
    <button onclick="clsGo(1)" ${CLS.slide===CLS.slides.length-1?"disabled":""}>▶</button>
  </div>
  <div class="cls-dots">${dots}</div>
  <p class="hint">Arrow keys ← → to change slides · the class position is remembered on this device</p>`;
  window.scrollTo(0,0);
}
document.addEventListener("keydown",e=>{
  if(!CLS.on)return;
  if(e.key==="ArrowRight")clsGo(1);
  else if(e.key==="ArrowLeft")clsGo(-1);
});

/* ================= boot ================= */
loadPeople();loadP();saveAll();renderHome();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>La Classe de Français</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="La Classe">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6F4EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EF; --ink:#23262B; --ink-soft:#5C636E; --line:#E0DBD1;
    --m-deep:#2C5C86; --m-bg:#E6EEF6; --m-edge:#B9D0E5;
    --f-deep:#A8425A; --f-bg:#F7E6EA; --f-edge:#E8BFC9;
    --gold:#B68A35; --gold-bg:#FBF3E2; --gold-edge:#E3CC9A;
    --good:#3E7C4F; --good-bg:#E8F2EA; --bad:#B23A2E; --bad-bg:#F6E3E0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Karla',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 50px;}
  .wrap{max-width:640px;margin:0 auto;}

  .app-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin:8px 0 6px;}
  .app-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.9rem;text-align:center;letter-spacing:-.3px;line-height:1.1;}
  .app-title .m{color:var(--m-deep);font-style:italic;}
  .app-title .f{color:var(--f-deep);font-style:italic;}
  .app-sub{text-align:center;color:var(--ink-soft);font-size:.82rem;margin-top:4px;}

  .who{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 4px;}
  .who span{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);align-self:center;}
  .pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;font-size:.85rem;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .pill.on{background:var(--m-deep);border-color:var(--m-deep);color:#fff;}
  .pill.add{border-style:dashed;color:var(--gold);border-color:var(--gold-edge);background:var(--gold-bg);}

  .progressline{display:flex;justify-content:space-between;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:14px 0 6px;}
  .progressline div{text-align:center;flex:1;}
  .progressline b{display:block;font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--m-deep);}
  .progressline small{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}
  .homebtns{display:flex;gap:9px;margin:10px 0 2px;}
  .homebtns button{flex:1;}
  .exportline{text-align:center;margin:8px 0 2px;}
  .exportline button{border:none;background:none;color:var(--ink-soft);font-size:.74rem;text-decoration:underline;cursor:pointer;font-family:'Karla',sans-serif;padding:3px 6px;}

  .bookhead{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:6px;margin:22px 2px 10px;line-height:1.5;}
  .lesson{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:#fff;cursor:pointer;}
  .lesson .num{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft);width:32px;flex:0 0 auto;}
  .lesson .t{font-weight:700;font-size:.92rem;flex:1;line-height:1.3;}
  .lesson .t small{display:block;font-weight:400;color:var(--ink-soft);font-size:.75rem;}
  .st{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.05em;border-radius:999px;padding:4px 9px;flex:0 0 auto;white-space:nowrap;}
  .st.done{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-edge);}
  .st.now{background:var(--m-bg);color:var(--m-deep);border:1px solid var(--m-edge);}
  .st.todo{background:var(--paper);color:var(--ink-soft);border:1px solid var(--line);}
  .lesson.exam{background:var(--gold-bg);border-color:var(--gold-edge);}
  .lesson.exam .num{color:var(--gold);}
  .lesson.exam .t{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;}

  .back{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:6px 0 12px;cursor:pointer;display:inline-block;}
  .lesson-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.55rem;line-height:1.15;letter-spacing:-.3px;}
  .lesson-meta{color:var(--ink-soft);font-size:.8rem;margin:4px 0 14px;}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .tabs button{border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:.78rem;font-weight:700;color:var(--ink-soft);background:#fff;cursor:pointer;font-family:'Karla',sans-serif;}
  .tabs button.on{background:var(--m-deep);border-color:var(--m-deep);color:#fff;}
  .panel{display:none;}.panel.on{display:block;}

  .gram{background:#fff;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:12px 14px;font-size:.88rem;margin-bottom:14px;}
  .gram b{color:var(--gold);}
  .word{display:flex;align-items:baseline;gap:9px;border-bottom:1px dashed var(--line);padding:9px 2px;}
  .word .fr{font-weight:700;font-size:1rem;}
  .word .fr.m{color:var(--m-deep);} .word .fr.f{color:var(--f-deep);}
  .word .ipa{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft);flex:0 0 auto;}
  .word .en{margin-left:auto;color:var(--ink-soft);font-size:.84rem;text-align:right;}
  .gtag{font-family:'JetBrains Mono',monospace;font-size:.58rem;border-radius:4px;padding:1px 5px;flex:0 0 auto;}
  .gtag.m{background:var(--m-bg);color:var(--m-deep);} .gtag.f{background:var(--f-bg);color:var(--f-deep);}
  .spk{border:1px solid var(--m-edge);background:var(--m-bg);color:var(--m-deep);border-radius:8px;font-size:.72rem;padding:2px 8px;cursor:pointer;flex:0 0 auto;font-family:'Karla',sans-serif;}
  .spk:hover{filter:brightness(1.05);}

  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 18px rgba(35,38,43,.06);margin-bottom:14px;}
  .q{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}
  .prompt{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;margin:6px 0 14px;line-height:1.25;}
  input.txt{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:16px;text-align:center;background:#fff;font-family:'Karla',sans-serif;}
  textarea.txt{width:100%;min-height:110px;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fff;font-family:'Karla',sans-serif;line-height:1.5;}
  .newword{display:block;width:100%;margin-top:12px;background:var(--gold-bg);color:var(--gold);border:1px dashed var(--gold-edge);padding:10px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;font-family:'Karla',sans-serif;}
  .row{display:flex;gap:9px;margin-top:14px;}
  .row button{flex:1;}
  button.act{border:none;background:var(--m-deep);color:#fff;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Karla',sans-serif;}
  button.act:hover{filter:brightness(1.08);}
  button.ghost{background:#fff;color:var(--m-deep);border:1px solid var(--m-deep);}
  button.goldb{background:var(--gold);}
  .feedback{margin-top:13px;text-align:center;font-weight:700;min-height:20px;font-size:.95rem;border-radius:10px;}
  .feedback.ok{color:var(--good);background:var(--good-bg);padding:9px;}
  .feedback.ko{color:var(--bad);background:var(--bad-bg);padding:9px;}
  .feedback .sub2{display:block;font-weight:400;font-size:.82rem;color:var(--ink-soft);margin-top:3px;}
  .hint{text-align:center;color:var(--ink-soft);font-size:.72rem;margin:10px 0 0;}
  .opts{display:grid;gap:9px;margin-top:6px;}
  .opt{border:1px solid var(--line);background:#fff;padding:12px;border-radius:12px;cursor:pointer;font-size:.95rem;text-align:left;font-family:'Karla',sans-serif;}
  .opt.okc{background:var(--good-bg);border-color:var(--good);color:var(--good);font-weight:700;}
  .opt.koc{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
  .genrebtns{display:flex;gap:12px;margin-top:6px;}
  .genrebtns button{flex:1;font-family:'Cormorant Garamond',serif;font-size:1.5rem;padding:15px;border-radius:14px;font-weight:600;cursor:pointer;}
  .genrebtns .un{color:var(--m-deep);border:2px solid var(--m-edge);background:var(--m-bg);}
  .genrebtns .une{color:var(--f-deep);border:2px solid var(--f-edge);background:var(--f-bg);}
  .donebtn{display:block;width:100%;margin-top:18px;background:#fff;border:1px solid var(--gold-edge);color:var(--gold);border-radius:12px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Karla',sans-serif;}
  .donebtn.is{background:var(--gold-bg);}
  .shadowtip{background:var(--gold-bg);border:1px dashed var(--gold-edge);border-radius:10px;padding:9px 12px;font-size:.8rem;color:var(--gold);text-align:center;margin-top:12px;font-weight:700;}

  /* dialogues */
  .lvlbtns{display:flex;gap:8px;margin-bottom:12px;}
  .lvlbtns button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 6px;font-size:.78rem;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:'Karla',sans-serif;}
  .lvlbtns button.on{background:var(--gold);border-color:var(--gold);color:#fff;}
  .lvlbtns button.won{border-color:var(--gold-edge);color:var(--gold);background:var(--gold-bg);}
  .bubble{max-width:88%;border-radius:14px;padding:10px 13px;margin-bottom:9px;font-size:.95rem;line-height:1.45;position:relative;}
  .bubble.a{background:#fff;border:1px solid var(--line);margin-right:auto;}
  .bubble.me{background:var(--m-bg);border:1px solid var(--m-edge);margin-left:auto;}
  .bubble .who{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:2px;}
  .bubble .entr{display:block;color:var(--ink-soft);font-size:.78rem;margin-top:3px;}
  .bubble .spk{margin-left:6px;}

  /* exam */
  .exam-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;letter-spacing:-.3px;}
  .exam-sub{color:var(--ink-soft);font-size:.8rem;margin:4px 0 14px;}
  .part{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;background:#fff;}
  .part .ph{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
  .part .pn{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--gold);border:1px solid var(--gold);border-radius:50%;width:23px;height:23px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .part .pt{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.12rem;flex:1;}
  .part .pts{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ink-soft);}
  .rtext{background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:11px 13px;font-size:.9rem;margin:8px 0;font-style:italic;}
  .mcq{margin:10px 0 14px;}
  .mcq .qq{font-weight:700;font-size:.9rem;margin-bottom:6px;}
  .mcq label{display:block;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:.9rem;cursor:pointer;background:#fff;}
  .mcq label.okc{background:var(--good-bg);border-color:var(--good);color:var(--good);font-weight:700;}
  .mcq label.koc{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
  .model{background:var(--gold-bg);border:1px solid var(--gold-edge);border-radius:10px;padding:11px 13px;font-size:.88rem;margin-top:8px;display:none;}
  .model b{color:var(--gold);}
  .speakx label{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:.9rem;cursor:pointer;background:#fff;}
  .speakx input{margin-top:3px;}
  .scoreline{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:.88rem;flex-wrap:wrap;}
  .scoreline input{width:70px;padding:8px;border:1px solid var(--line);border-radius:10px;font-size:15px;text-align:center;}
  .rule{background:var(--gold-bg);border:1px solid var(--gold-edge);border-radius:12px;padding:11px 13px;font-size:.82rem;margin:4px 0 14px;}
  .rule b{color:var(--gold);}
  .result{border:2px solid var(--gold);border-radius:16px;background:#fff;padding:18px;text-align:center;margin-top:14px;}
  .result .big{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;color:var(--gold);}
  .result .det{color:var(--ink-soft);font-size:.85rem;margin-top:6px;}

  .note{background:#fff;border:1px dashed var(--gold-edge);border-radius:14px;padding:16px;font-size:.9rem;color:var(--ink-soft);}

  /* ---------- Mode Classe (shared class device, big screen) ---------- */
  body.classe .wrap{max-width:980px;}
  .cls-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .cls-top .x{margin-left:auto;}
  .cls-lnav{font-family:'JetBrains Mono',monospace;font-size:.72rem;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;cursor:pointer;color:var(--ink-soft);}
  .cls-lnav.big{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--ink);cursor:default;}
  .cls-slide{background:#fff;border:1px solid var(--line);border-radius:20px;padding:clamp(22px,4vw,46px);box-shadow:0 8px 30px rgba(35,38,43,.08);min-height:56vh;}
  .cls-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  .cls-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(2rem,5vw,3.2rem);line-height:1.08;letter-spacing:-.5px;}
  .cls-sub{color:var(--ink-soft);font-size:clamp(1rem,2.2vw,1.25rem);margin-top:12px;}
  .cls-word{display:flex;align-items:baseline;gap:14px;border-bottom:1px dashed var(--line);padding:12px 2px;}
  .cls-word .fr{font-weight:700;font-size:clamp(1.25rem,2.8vw,1.7rem);}
  .cls-word .fr.m{color:var(--m-deep);} .cls-word .fr.f{color:var(--f-deep);}
  .cls-word .en{margin-left:auto;color:var(--ink-soft);font-size:clamp(.95rem,2vw,1.15rem);text-align:right;}
  .cls-word .spk{font-size:.95rem;padding:4px 12px;}
  .cls-gram{font-size:clamp(1.15rem,2.6vw,1.6rem);line-height:1.7;}
  .cls-gram b{color:var(--gold);}
  .cls-bubble{max-width:82%;border-radius:16px;padding:14px 18px;margin-bottom:12px;font-size:clamp(1.05rem,2.4vw,1.4rem);line-height:1.5;}
  .cls-bubble.a{background:var(--paper);border:1px solid var(--line);margin-right:auto;}
  .cls-bubble.me{background:var(--m-bg);border:1px solid var(--m-edge);margin-left:auto;}
  .cls-bubble .who{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .cls-parler{list-style:none;}
  .cls-parler li{font-size:clamp(1.1rem,2.5vw,1.5rem);padding:14px 0 14px 44px;position:relative;border-bottom:1px dashed var(--line);line-height:1.5;}
  .cls-parler li::before{content:"🗣";position:absolute;left:0;top:12px;}
  .cls-tip{background:var(--gold-bg);border:1px dashed var(--gold-edge);border-radius:12px;padding:12px 16px;font-size:clamp(.9rem,2vw,1.05rem);color:var(--gold);font-weight:700;text-align:center;margin-top:18px;}
  .cls-nav{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:16px;}
  .cls-nav button{border:none;background:var(--m-deep);color:#fff;border-radius:12px;padding:14px 26px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Karla',sans-serif;}
  .cls-nav button:disabled{opacity:.35;cursor:default;}
  .cls-nav .cnt{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--ink-soft);min-width:70px;text-align:center;}
  .cls-dots{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
  .cls-dots span{width:9px;height:9px;border-radius:50%;background:var(--line);cursor:pointer;}
  .cls-dots span.on{background:var(--gold);}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:999px;padding:9px 18px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9;max-width:90%;text-align:center;}
  footer{text-align:center;color:var(--ink-soft);font-size:.72rem;margin-top:34px;padding-top:16px;border-top:1px solid var(--line);}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="toast"></div>

<script>
/* ============================================================
   LA CLASSE DE FRANÇAIS — v2
   Curriculum: the REAL books (extracts in book-extracts/)
   L1–L16 = Débutant Complet A1.1 (29 ch) · L17–L32 = Débutant A1 (28 ch)
   L33–L40 = Intermédiaire A2/B1 (25 ch)
   Word row: [english, "article français", "/ipa/", g, exFR, exEN]
   ============================================================ */

const BOOKS=[
 "Livre 1 · Débutant Complet A1.1 (29 chapitres)",
 "Livre 2 · Débutant A1, 3e édition (28 chapitres)",
 "Livre 3 · Intermédiaire A2/B1, 3e édition (25 chapitres)"
];

const VERBS={
  "être":["suis","es","est","sommes","êtes","sont"],
  "avoir":["ai","as","a","avons","avez","ont"],
  "aller":["vais","vas","va","allons","allez","vont"],
  "faire":["fais","fais","fait","faisons","faites","font"],
  "parler":["parle","parles","parle","parlons","parlez","parlent"],
  "habiter":["habite","habites","habite","habitons","habitez","habitent"],
  "aimer":["aime","aimes","aime","aimons","aimez","aiment"],
  "travailler":["travaille","travailles","travaille","travaillons","travaillez","travaillent"],
  "acheter":["achète","achètes","achète","achetons","achetez","achètent"],
  "appeler (j'appelle)":["appelle","appelles","appelle","appelons","appelez","appellent"],
  "comprendre":["comprends","comprends","comprend","comprenons","comprenez","comprennent"],
  "lire":["lis","lis","lit","lisons","lisez","lisent"],
  "écrire":["écris","écris","écrit","écrivons","écrivez","écrivent"],
  "venir":["viens","viens","vient","venons","venez","viennent"],
  "jouer":["joue","joues","joue","jouons","jouez","jouent"],
  "manger":["mange","manges","mange","mangeons","mangez","mangent"],
  "boire":["bois","bois","boit","buvons","buvez","boivent"],
  "prendre":["prends","prends","prend","prenons","prenez","prennent"]
};
const CORE=["être","avoir","aller","faire"];
const PRON=["je","tu","il / elle","nous","vous","ils / elles"];
const GEN_DIST=["Je ne sais pas.","Merci, au revoir !","Oui, bien sûr.","Non merci."];

/* === LESSONS_START === */
const LESSONS=[
{n:1,b:0,ch:"ch. 1–2 (p. 6–9)",t:"Les lettres & les nombres",s:"A, B, C… · 1, 2, 3… · épeler",
 g:"Les accents sur le e : <b>é</b> (accent aigu), <b>è</b> (grave), <b>ê</b> (circonflexe), <b>ë</b> (tréma). Attention : 70 = soixante-dix, 80 = quatre-vingts, 90 = quatre-vingt-dix. En Belgique on dit septante / nonante !",
 v:["être","avoir"],
 w:[
  ["a letter","une lettre","/lɛtʁ/","f","Il y a quatre lettres dans « Iris ».","There are four letters in 'Iris'."],
  ["a vowel","une voyelle","/vwajɛl/","f","A, E, I, O, U, Y sont des voyelles.","A E I O U Y are vowels."],
  ["a consonant","une consonne","/kɔ̃sɔn/","f","",""],
  ["a capital letter","une majuscule","/maʒyskyl/","f","Paris commence par une majuscule.","Paris starts with a capital."],
  ["a small letter","une minuscule","/minyskyl/","f","",""],
  ["an accent","un accent","/aksɑ̃/","m","Café a un accent aigu.","Café has an acute accent."],

/* ================= audio (TTS) ================= */
let VOICE=null,TTS=("speechSynthesis" in window);
function pickVoice(){
  if(!TTS)return;
  const vs=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith("fr"));
  VOICE=vs.find(v=>/fr[-_]FR/i.test(v.lang))||vs[0]||null;
}
if(TTS){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function speak(txt){
  if(!TTS){toast("Pas de voix française sur cet appareil");return;}
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang="fr-FR";if(VOICE)u.voice=VOICE;u.rate=0.85;
    speechSynthesis.speak(u);
  }catch(e){}
}
function spkBtn(txt){return `<button class="spk" onclick="speak(this.dataset.s);event.stopPropagation()" data-s="${esc(txt).replace(/"/g,"&quot;")}">🔊</button>`;}

/* ================= state & storage ================= */
const $=id=>document.getElementById(id);
let people,cur,P;
function loadPeople(){
  try{people=JSON.parse(localStorage.getItem("fcl_people")||"null")||["Iris"];}catch(e){people=["Iris"];}
  cur=localStorage.getItem("fcl_cur")||people[0];
  if(people.indexOf(cur)<0)cur=people[0];
}
function loadP(){
  try{P=JSON.parse(localStorage.getItem("fcl_p_"+cur)||"null");}catch(e){P=null;}
  if(!P)P={done:{},exam:{},dlg:{},weak:{},correct:0,streak:0,last:""};
  P.dlg=P.dlg||{};P.weak=P.weak||{};
}
function saveAll(){
  localStorage.setItem("fcl_people",JSON.stringify(people));
  localStorage.setItem("fcl_cur",cur);
  localStorage.setItem("fcl_p_"+cur,JSON.stringify(P));
}
function today(){return new Date().toISOString().slice(0,10);}
function touch(){
  const t=today();
  if(P.last!==t){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    P.streak=(P.last===y)?(P.streak||0)+1:1;
    P.last=t;
  }
}
function markWeak(key){P.weak[key]=(P.weak[key]||0)+1;}
function easeWeak(key){if(P.weak[key]){P.weak[key]--;if(P.weak[key]<=0)delete P.weak[key];}}
function scoreGood(key){P.correct=(P.correct||0)+1;if(key)easeWeak(key);touch();saveAll();}
function toast(msg){const t=$("toast");t.textContent=msg;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2400);}

/* ================= helpers ================= */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function norm(s){
  return String(s).toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/œ/g,"oe").replace(/[’']/g," ")
    .replace(/[^a-z0-9 -]/g," ").replace(/-/g," ")
    .replace(/\s+/g," ").trim();
}
function stripArt(s){return norm(s).replace(/^(une|un|des|les|le|la|l) /,"");}
function art(fr){const m=fr.match(/^(une|un|les|le|la|l')\s?/i);return m?m[0].trim():"";}
function bare(fr){return fr.replace(/^(une|un|les|le|la|l')\s?/i,"");}
function pick(arr,not){
  if(!arr.length)return null;
  if(arr.length===1)return arr[0];
  let it;do{it=arr[Math.floor(Math.random()*arr.length)];}while(it===not);
  return it;
}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function lessonByN(n){return LESSONS.find(l=>l.n===n);}
function doneCount(){return LESSONS.filter(l=>P.done[l.n]).length;}
function examsPassed(){return Object.keys(P.exam||{}).filter(k=>P.exam[k]&&P.exam[k].pass).length;}
function examUnlocked(e){for(let i=e.after-4;i<=e.after;i++){if(!P.done[i])return false;}return true;}
function studiedLessons(){
  const out=LESSONS.filter(l=>l.w.length&&P.done[l.n]);
  const first=LESSONS.find(l=>!P.done[l.n]&&l.w.length);
  if(first)out.push(first);
  return out;
}

function setPerson(p){cur=p;loadP();saveAll();renderHome();}
function addPerson(){
  const n=prompt("Prénom du nouvel élève ?");
  if(n&&n.trim()){
    const nm=n.trim();
    if(people.indexOf(nm)<0)people.push(nm);
    cur=nm;loadP();saveAll();renderHome();toast("Bienvenue, "+nm+" !");
  }
}
function removePerson(){
  if(people.length<2){toast("Il faut garder au moins un nom !");return;}
  const n=prompt("Quel nom retirer ? ("+people.join(", ")+")");
  if(!n||!n.trim())return;
  const nm=n.trim();
  const idx=people.findIndex(p=>p.toLowerCase()===nm.toLowerCase());
  if(idx<0){toast("« "+nm+" » n'est pas dans la liste.");return;}
  const real=people[idx];
  if(!confirm("Retirer « "+real+" » et effacer sa progression sur cet appareil ?"))return;
  people.splice(idx,1);
  localStorage.removeItem("fcl_p_"+real);
  if(cur===real){cur=people[0];loadP();}
  saveAll();renderHome();toast("« "+real+" » retiré.");
}
function exportProgress(){
  let txt="LA CLASSE DE FRANÇAIS — progression de "+cur+" ("+today()+")\n";
  txt+="Leçons terminées : "+(LESSONS.filter(l=>P.done[l.n]).map(l=>"L"+l.n).join(", ")||"aucune")+"\n";
  txt+="Examens : "+(Object.keys(P.exam).map(k=>"EX"+k+" = "+P.exam[k].total+"/100"+(P.exam[k].pass?" (réussi)":" (à refaire)")).join(", ")||"aucun")+"\n";
  txt+="Mots difficiles : "+(Object.keys(P.weak).length? Object.keys(P.weak).map(k=>{const[a,b]=k.split(":");const L2=lessonByN(+a);return L2&&L2.w[+b]?L2.w[+b][1]:"";}).filter(Boolean).join(", ") : "aucun")+"\n";
  txt+="Bonnes réponses : "+(P.correct||0)+" · Jours de suite : "+(P.streak||0);
  copyText(txt);
}
function backupProgress(){
  const code="FCL1."+btoa(unescape(encodeURIComponent(JSON.stringify({name:cur,p:P}))));
  copyText(code);
  toast("Code de sauvegarde copié — garde-le précieusement !");
}
function restoreProgress(){
  const code=prompt("Colle ton code de sauvegarde (FCL1.…) :");
  if(!code)return;
  try{
    const obj=JSON.parse(decodeURIComponent(escape(atob(code.trim().replace(/^FCL1\./,"")))));
    if(!obj||!obj.p)throw 0;
    if(people.indexOf(obj.name)<0)people.push(obj.name);
    cur=obj.name;P=obj.p;P.dlg=P.dlg||{};P.weak=P.weak||{};
    saveAll();renderHome();toast("Progression de "+obj.name+" restaurée !");
  }catch(e){toast("Code invalide…");}
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("Copié !"),()=>fallbackCopy(txt));
  }else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);
  ta.select();try{document.execCommand("copy");toast("Copié !");}catch(e){toast("Copie impossible.");}
  document.body.removeChild(ta);
}

function checkQuiz(){
  if(!qw)return;

  const f=$("qFb");

    scoreGood(wkey(L,qw));setTimeout(newQuiz,1600);

function conjShow(){
  const form=VERBS[cv][cp];

  return pr+" "+form;

  if(!cv)return;const inp=$("cIn").value;if(!inp.trim())return;

  if(cleaned===norm(form)){
    f.className="feedback ok";f.innerHTML=`✓ Bravo ! <b>${esc(conjShow())}</b> ${spkBtn(conjShow())}`;scoreGood();setTimeout(newConj,1500);

function dlgLevel1(){
  let h=L.d.lines.map(l=>bubble(l,true)).join("");
  h+=`<div class="shadowtip">🗣 Écoute chaque bulle (🔊) et répète-la à voix haute — surtout les bleues !</div>

  <button class="act goldb" onclick="dlgWin(1)">Niveau ① fait ✓</button></div>`;
  $("dlgArea").innerHTML=h;
}
function playAllDlg(){
  if(!TTS){toast("Pas de voix française sur cet appareil");return;}
  speechSynthesis.cancel();
  L.d.lines.forEach(l=>{
    const u=new SpeechSynthesisUtterance(l[1]);
    u.lang="fr-FR";if(VOICE)u.voice=VOICE;u.rate=0.85;
    speechSynthesis.speak(u);

function dlgNextStep(){
  const lines=L.d.lines;
  if(dStep>=lines.length){
    const ok=dErr===0;
    $("dlgArea").innerHTML=(ok?`<div class="feedback ok" style="margin-top:4px;">🎉 Scène complète sans erreur — bravo !</div>`:`<div class="feedback ok" style="margin-top:4px;">Scène terminée ! (${dErr} aide${dErr>1?"s":""}) — refais-la pour la réussir sans erreur.</div>`)+
      `<div class="row"><button class="act" onclick="renderDlg(${dLvl})">↻ Recommencer</button>${ok?`<button class="act goldb" onclick="dlgWin(${dLvl})">Niveau ${dLvl===2?"②":"③"} réussi ✓</button>`:""}</div>`;
    return;
  }
  const line=lines[dStep];
  let h=lines.slice(0,dStep).map(l=>bubble(l,false)).join("");
  if(line[0]==="A"){
    h+=bubble(line,false);
    $("dlgArea").innerHTML=h+`<div class="row"><button class="act ghost" onclick="dStep++;dlgNextStep()">Continuer →</button></div>`;
    speak(line[1]);
  }else{
    if(dLvl===2){
      const others=shuffle(L.d.lines.filter(l=>l[0]==="M"&&l!==line).map(l=>l[1]).concat(GEN_DIST)).slice(0,2);
      const opts=shuffle([line[1]].concat(others));
      h+=`<div class="bubble me"><span class="who">— toi — (choisis ta réplique : « ${esc(line[2])} »)</span>
        <div class="opts">${opts.map(o=>`<div class="opt" onclick="dlgPick(this,${o===line[1]})">${esc(o)}</div>`).join("")}</div></div>`;
      $("dlgArea").innerHTML=h;
    }else{
      h+=`<div class="bubble me"><span class="who">— toi — dis en français : « ${esc(line[2])} »</span>
        <input class="txt" id="dIn" placeholder="écris ta réplique…" autocomplete="off" onkeydown="if(event.key==='Enter')dlgType()">
        <div class="row"><button class="act" onclick="dlgType()">Vérifier</button>
        <button class="act ghost" onclick="dlgHelp()">🤔 aide</button></div>
        <div class="feedback" id="dFb"></div></div>`;
      $("dlgArea").innerHTML=h;
      const inp=$("dIn");if(inp)inp.focus();
    }
  }
}
function dlgPick(el,ok){
  const line=L.d.lines[dStep];
  if(ok){
    el.classList.add("okc");speak(line[1]);scoreGood();
    setTimeout(()=>{dStep++;dlgNextStep();},1100);
  }else{
    el.classList.add("koc");dErr++;
  }
}
function dlgType(){
  const line=L.d.lines[dStep];
  const inp=$("dIn").value;if(!inp.trim())return;
  const f=$("dFb");
  if(norm(inp)===norm(line[1])){
    f.className="feedback ok";f.innerHTML="✓ Parfait !";
    speak(line[1]);scoreGood();
    setTimeout(()=>{dStep++;dlgNextStep();},1100);
  }else{
    f.className="feedback ko";f.innerHTML=`Pas tout à fait. Modèle : <b>${esc(line[1])}</b>`;
    dErr++;
  }
}
function dlgHelp(){
  const line=L.d.lines[dStep];
  const f=$("dFb");f.className="feedback ok";f.innerHTML=`<b>${esc(line[1])}</b> ${spkBtn(line[1])}`;
  dErr++;
}
function dlgWin(lvl){
  P.dlg[L.n]=Math.max(P.dlg[L.n]||0,lvl);
  touch();saveAll();
  toast(lvl>=3?"🎉 Dialogue maîtrisé aux 3 niveaux !":"Niveau "+lvl+" validé — passe au niveau "+(lvl+1)+" !");
  renderDlg(Math.min(3,lvl+1));
}

/* ================= révision mixte ================= */
let RV=null;
function startReview(){
  const pool=studiedLessons();
  if(!pool.length){toast("Commence d'abord une leçon !");return;}
  RV={i:0,ok:0,qs:[]};
  for(let k=0;k<10;k++){
    let li,wi=null;
    const weakKeys=Object.keys(P.weak);
    if(weakKeys.length&&Math.random()<0.5){
      const wk=weakKeys[Math.floor(Math.random()*weakKeys.length)].split(":");
      const l2=lessonByN(+wk[0]);
      if(l2&&l2.w[+wk[1]]){li=l2;wi=+wk[1];}
    }
    if(!li){li=pool[Math.floor(Math.random()*pool.length)];}
    const types=["quiz","ecoute","genre","conj"];
    let ty=types[Math.floor(Math.random()*types.length)];
    if(ty==="ecoute"&&!TTS)ty="quiz";
    if(ty==="genre"){
      const gp=li.w.filter(w=>w[3]&&/^(un|une|le|la|l')/i.test(w[1])&&!/^les /i.test(w[1]));
      if(!gp.length)ty="quiz";
    }
    RV.qs.push({ty:ty,l:li,wi:wi});
  }
  reviewStep();
}
function reviewStep(){
  if(RV.i>=RV.qs.length){
    $("app").innerHTML=`
    <span class="back" onclick="renderHome()">← Accueil</span>
    <div class="card" style="text-align:center;">
      <div class="prompt">Révision terminée !</div>
      <div class="result"><div class="big">${RV.ok}/10</div>
      <div class="det">${RV.ok>=8?"Excellent ! 🎉":RV.ok>=5?"Bien — on continue demain !":"Les mots difficiles reviendront — courage !"}</div></div>
      <div class="row"><button class="act" onclick="startReview()">↻ Encore 10</button><button class="act ghost" onclick="renderHome()">Accueil</button></div>
    </div>`;
    return;
  }
  const q=RV.qs[RV.i];
  const l2=q.l;
  const w=(q.wi!=null&&l2.w[q.wi])?l2.w[q.wi]:l2.w[Math.floor(Math.random()*l2.w.length)];
  let inner="";
  if(q.ty==="quiz"){
    inner=`<div class="q">Leçon ${l2.n} · Écris le français :</div>
    <div class="prompt">${esc(w[0])}</div>
    <input class="txt" id="rIn" autocomplete="off" onkeydown="if(event.key==='Enter')revCheck()">
    <div class="feedback" id="rFb"></div>
    <div class="row"><button class="act" onclick="revCheck()">Vérifier</button><button class="act ghost" onclick="revSkip()">Je ne sais pas</button></div>`;
    RV.cur={w:w,l:l2,mode:"quiz"};
  }else if(q.ty==="ecoute"){
    const others=shuffle(l2.w.filter(x=>x!==w)).slice(0,2);
    const opts=shuffle([w].concat(others));
    inner=`<div class="q">Leçon ${l2.n} · Écoute et choisis :</div>
    <div class="prompt" style="font-size:1.2rem;">🎧 <button class="act ghost" style="padding:8px 18px;font-size:14px;" onclick="speak('${esc(w[1]).replace(/'/g,"\\'")}')">▶ Écouter</button></div>
    <div class="opts">${opts.map(o=>`<div class="opt" onclick="revPick(this,${o===w})">${esc(o[0])}</div>`).join("")}</div>
    <div class="feedback" id="rFb"></div>`;
    RV.cur={w:w,l:l2,mode:"ecoute"};
    setTimeout(()=>speak(w[1]),300);
  }else if(q.ty==="genre"){
    const gp=l2.w.filter(x=>x[3]&&/^(un|une|le|la|l')/i.test(x[1])&&!/^les /i.test(x[1]));
    const gw2=gp[Math.floor(Math.random()*gp.length)];
    inner=`<div class="q">Leçon ${l2.n} · Masculin ou féminin ?</div>
    <div class="prompt">${esc(bare(gw2[1]))}</div>
    <div class="genrebtns"><button class="un" onclick="revGenre('m')">un</button><button class="une" onclick="revGenre('f')">une</button></div>
    <div class="feedback" id="rFb"></div>`;
    RV.cur={w:gw2,l:l2,mode:"genre"};
  }else{
    const vs=(l2.v&&l2.v.length?l2.v:CORE).filter(v=>VERBS[v]);
    const cv2=vs[Math.floor(Math.random()*vs.length)];
    const cp2=Math.floor(Math.random()*6);
    inner=`<div class="q">Leçon ${l2.n} · Conjugue :</div>
    <div class="prompt">${esc(cv2)} — <i>${PRON[cp2]}</i> ______</div>
    <input class="txt" id="rIn" autocomplete="off" onkeydown="if(event.key==='Enter')revConj()">
    <div class="feedback" id="rFb"></div>
    <div class="row"><button class="act" onclick="revConj()">Vérifier</button><button class="act ghost" onclick="revSkip()">Je ne sais pas</button></div>`;
    RV.cur={verb:cv2,pi:cp2,l:l2,mode:"conj"};
  }
  $("app").innerHTML=`
  <span class="back" onclick="renderHome()">← Quitter la révision</span>
  <div class="lesson-title">Révision mixte — ${RV.i+1}/10</div>
  <div class="lesson-meta">Score : ${RV.ok} ✓</div>
  <div class="card">${inner}</div>`;
  window.scrollTo(0,0);
}
function revNext(good){
  if(good)RV.ok++;
  RV.i++;
  setTimeout(reviewStep,1300);
}
function revCheck(){
  const c=RV.cur,inp=$("rIn").value;if(!inp.trim())return;
  const f=$("rFb");
  const ok=norm(inp)===norm(c.w[1])||stripArt(inp)===stripArt(c.w[1]);
  if(ok){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.w[1])}</b>`;scoreGood(wkey(c.l,c.w));revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(c.w[1])}</b>`;markWeak(wkey(c.l,c.w));saveAll();revNext(false);}
}
function revSkip(){
  const c=RV.cur,f=$("rFb");
  if(c.mode==="conj"){f.className="feedback ko";f.innerHTML=`Réponse : <b>${esc(VERBS[c.verb][c.pi])}</b>`;}
  else{f.className="feedback ko";f.innerHTML=`Réponse : <b>${esc(c.w[1])}</b>`;markWeak(wkey(c.l,c.w));saveAll();}
  revNext(false);
}
function revPick(el,ok){
  const c=RV.cur,f=$("rFb");
  if(ok){el.classList.add("okc");f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.w[1])}</b> = ${esc(c.w[0])}`;scoreGood(wkey(c.l,c.w));revNext(true);}
  else{el.classList.add("koc");f.className="feedback ko";f.innerHTML=`✗ C'était <b>${esc(c.w[1])}</b> = ${esc(c.w[0])}`;markWeak(wkey(c.l,c.w));saveAll();revNext(false);}
}
function revGenre(g){
  const c=RV.cur,f=$("rFb");
  if(g===c.w[3]){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(c.w[1])}</b>`;scoreGood(wkey(c.l,c.w));revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(c.w[1])}</b> (${c.w[3]})`;markWeak(wkey(c.l,c.w));saveAll();revNext(false);}
}
function revConj(){
  const c=RV.cur,inp=$("rIn").value;if(!inp.trim())return;
  const f=$("rFb");
  const form=VERBS[c.verb][c.pi];
  const cleaned=norm(inp).replace(/^(je|j|tu|il|elle|on|nous|vous|ils|elles) /,"");
  if(cleaned===norm(form)){f.className="feedback ok";f.innerHTML=`✓ <b>${esc(form)}</b>`;scoreGood();revNext(true);}
  else{f.className="feedback ko";f.innerHTML=`✗ <b>${esc(form)}</b>`;revNext(false);}
}

function gradeMcq(prefix,docs,fbId){
  const qs=[];docs.forEach(d=>d.qs.forEach(q=>qs.push(q)));
  let corr=0;
  qs.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="${prefix}${i}"]:checked`);
    q.o.forEach((o,oi)=>{
      const lab=$(`${prefix}_${i}_${oi}`);
      if(!lab)return;
      lab.classList.remove("okc","koc");
      if(oi===q.c)lab.classList.add("okc");
      else if(sel&&+sel.value===oi)lab.classList.add("koc");
    });
    if(sel&&+sel.value===q.c)corr++;
  });
  const score=Math.round(25*corr/qs.length);
  const f=$(fbId);f.className="feedback "+(score>=13?"ok":"ko");
  f.textContent=`${corr}/${qs.length} bonnes réponses → ${score}/25`;
  return score;
}
function gradeListen(){lScore=gradeMcq("lq",E.listen,"lFb");}
function gradeReading(){rScore=gradeMcq("rq",E.read,"rFb2");}
function showModels(){E.write.forEach((w,wi)=>{$("wm_"+wi).style.display="block";});}
function copyWriting(){
  let txt="EXAMEN "+E.n+" — production écrite de "+cur+" ("+today()+")\n";
  E.write.forEach((w,wi)=>{
    txt+="\nSujet "+(wi+1)+" : "+w.p+"\nMa réponse : "+($("w_"+wi).value||"(vide)")+"\n";
  });
  txt+="\nTuteur : corrige selon la grille DELF A2 et donne une note sur 25.";
  copyText(txt);
}
function finishExam(){
  if(lScore===null){toast("Corrige d'abord la partie 1 (écoute) !");return;}
  if(rScore===null){toast("Corrige d'abord la partie 2 (lecture) !");return;}
  const wv=$("wScore").value;
  if(wv===""){toast("Entre ta note d'écrit (0–25) — ou demande-la au tuteur.");return;}
  const w=Math.max(0,Math.min(25,+wv));
  const s=Array.from(document.querySelectorAll(".spkx")).filter(c=>c.checked).length*5;
  const total=lScore+rScore+w+s;
  const pass=total>=50&&lScore>=5&&rScore>=5&&w>=5&&s>=5;
  P.exam[E.n]={l:lScore,r:rScore,w:w,s:s,total:total,pass:pass};
  touch();saveAll();
  $("exResult").innerHTML=`<div class="result">
    <div class="big">${total}/100</div>
    <div class="verdict" style="font-weight:700;color:${pass?"var(--good)":"var(--bad)"}">${pass?"✓ Réussi — félicitations !":"Pas encore 50 — on révise et on le repasse !"}</div>
    <div class="det">Oral ${lScore}/25 · Écrits ${rScore}/25 · Écrite ${w}/25 · Orale ${s}/25</div>
    <div class="row"><button class="act" onclick="renderHome()">← Retour aux leçons</button></div>
  </div>`;
  $("exResult").scrollIntoView({behavior:"smooth"});
}

let CLS={n:parseInt(localStorage.getItem("fclc_pos")||"1",10)||1,slide:0,on:false,slides:[]};
function clsSaveState(){localStorage.setItem("fclc_pos",String(CLS.n));}
function buildSlides(l){
  const slides=[{ty:"title"}];
  for(let i=0;i<l.w.length;i+=8)slides.push({ty:"mots",from:i,to:Math.min(i+8,l.w.length)});
  if(l.g)slides.push({ty:"gram"});
  if(l.d)slides.push({ty:"dlg"});
  if(PARLER[l.n]||l.x.length)slides.push({ty:"parler"});
  slides.push({ty:"devoirs"});
  return slides;
}
function openClasse(){
  CLS.on=true;document.body.classList.add("classe");
  const l=lessonByN(CLS.n);
  CLS.slides=l.w.length?buildSlides(l):[];
  if(CLS.slide>=CLS.slides.length)CLS.slide=0;
  renderClasse();
}
function quitClasse(){CLS.on=false;document.body.classList.remove("classe");if(TTS)speechSynthesis.cancel();renderHome();}
function clsLesson(delta){
  const nn=CLS.n+delta;
  if(nn<1||nn>40)return;
  CLS.n=nn;CLS.slide=0;clsSaveState();
  const l=lessonByN(CLS.n);
  CLS.slides=l.w.length?buildSlides(l):[];
  renderClasse();
}
function clsGo(delta){
  const ns=CLS.slide+delta;
  if(ns<0||ns>=CLS.slides.length)return;
  CLS.slide=ns;renderClasse();
}
function clsJump(i){CLS.slide=i;renderClasse();}
function playList(texts){
  if(!TTS){toast("Pas de voix française sur cet appareil");return;}
  speechSynthesis.cancel();
  texts.forEach(t=>{
    const u=new SpeechSynthesisUtterance(t);
    u.lang="fr-FR";if(VOICE)u.voice=VOICE;u.rate=0.82;
    speechSynthesis.speak(u);
  });
}
function clsPlaySlide(){
  const l=lessonByN(CLS.n),s=CLS.slides[CLS.slide];
  if(s.ty==="mots")playList(l.w.slice(s.from,s.to).map(w=>w[1]));
  else if(s.ty==="dlg")playList(l.d.lines.map(x=>x[1]));
}
function renderClasse(){
  const l=lessonByN(CLS.n);
  let top=`<div class="cls-top">
    <button class="cls-lnav" onclick="clsLesson(-1)">‹ leçon préc.</button>
    <span class="cls-lnav big">Leçon ${l.n} — ${esc(l.t)}</span>
    <button class="cls-lnav" onclick="clsLesson(1)">leçon suiv. ›</button>
    <button class="cls-lnav x" onclick="quitClasse()">✕ quitter</button>
  </div>`;
  if(!l.w.length){
    $("app").innerHTML=top+`<div class="cls-slide" style="display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center;max-width:34em;">
        <div class="cls-eyebrow">${esc(BOOKS[l.b])} · ${esc(l.ch)}</div>
        <div class="cls-title">Leçon ${l.n} — ${esc(l.t)}</div>
        <div class="cls-sub">📚 Cette leçon n'est pas encore chargée dans l'app.<br>
        Utilisez le livre papier (${esc(l.ch)}) et dites au tuteur : <b>« Prépare la leçon ${l.n} »</b>.</div>
      </div></div>`;
    window.scrollTo(0,0);return;
  }
  const s=CLS.slides[CLS.slide];
  let body="";
  if(s.ty==="title"){
    body=`<div style="text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:50vh;">
      <div class="cls-eyebrow">Mode Classe · ${esc(BOOKS[l.b])} · ${esc(l.ch)}</div>
      <div class="cls-title">Leçon ${l.n}<br>${esc(l.t)}</div>
      <div class="cls-sub">${esc(l.s)} · ${l.w.length} mots</div>
    </div>`;
  }else if(s.ty==="mots"){
    body=`<div class="cls-eyebrow">Les mots · ${s.from+1}–${s.to} / ${l.w.length} — écoutez et répétez ensemble !</div>`;
    l.w.slice(s.from,s.to).forEach(w=>{
      body+=`<div class="cls-word"><span class="fr ${w[3]}">${esc(w[1])}</span>${w[3]?`<span class="gtag ${w[3]}">${w[3]}</span>`:""}${spkBtn(w[1])}<span class="en">${esc(w[0])}</span></div>`;
    });
    body+=`<div class="cls-nav" style="justify-content:flex-start;"><button onclick="clsPlaySlide()">▶ Écouter tout — la classe répète</button></div>`;
  }else if(s.ty==="gram"){
    body=`<div class="cls-eyebrow">La grammaire</div><div class="cls-gram">${l.g}</div>`;
  }else if(s.ty==="dlg"){
    body=`<div class="cls-eyebrow">Le dialogue · ${esc(l.d.t)}</div>`;
    l.d.lines.forEach(x=>{
      const me=x[0]==="M";
      body+=`<div class="cls-bubble ${me?"me":"a"}"><span class="who">${me?"— élève —":"— l'autre —"}</span>${esc(x[1])} ${spkBtn(x[1])}</div>`;
    });
    body+=`<div class="cls-nav" style="justify-content:flex-start;"><button onclick="clsPlaySlide()">▶ Toute la scène</button></div>
    <div class="cls-tip">🎭 Maintenant, jouez la scène à deux — puis changez les détails (les noms, les nombres…) !</div>`;
  }else if(s.ty==="parler"){
    const prompts=PARLER[l.n]||l.x.slice(0,3).map(x2=>"Dites en français : « "+x2[0]+" »");
    body=`<div class="cls-eyebrow">À vous de parler ! — activités menées par les profs</div>
    <ul class="cls-parler">${prompts.map(p2=>`<li>${esc(p2)}</li>`).join("")}</ul>
    <div class="cls-tip">Chacun parle — les profs corrigent la prononciation. Pas de stress, on apprend !</div>`;
  }else{
    body=`<div class="cls-eyebrow">Devoirs — avant la prochaine classe</div>
    <ul class="cls-parler">
      <li>📖 Le livre : relisez ${esc(l.ch)} et faites les exercices de la page de droite (sur papier).</li>
      <li>📱 L'app, sur VOTRE téléphone : Quiz + Écoute + Genre + Conjugaison de la leçon ${l.n}, et le Dialogue jusqu'au niveau ③.</li>
      <li>🔁 Une Révision mixte (10 questions) par jour.</li>
    </ul>
    <div class="cls-tip">Les rapides peuvent prendre de l'avance sur la leçon suivante — la classe, elle, avance au rythme des profs !</div>`;
  }
  const dots=CLS.slides.map((x,i)=>`<span class="${i===CLS.slide?"on":""}" onclick="clsJump(${i})"></span>`).join("");
  $("app").innerHTML=top+`<div class="cls-slide">${body}</div>
  <div class="cls-nav">
    <button onclick="clsGo(-1)" ${CLS.slide===0?"disabled":""}>◀</button>
    <span class="cnt">${CLS.slide+1} / ${CLS.slides.length}</span>
    <button onclick="clsGo(1)" ${CLS.slide===CLS.slides.length-1?"disabled":""}>▶</button>
  </div>
  <div class="cls-dots">${dots}</div>
  <p class="hint">Flèches ← → du clavier pour changer de diapositive · la position de la classe est mémorisée sur cet appareil</p>`;
  window.scrollTo(0,0);
}
document.addEventListener("keydown",e=>{
  if(!CLS.on)return;
  if(e.key==="ArrowRight")clsGo(1);
  else if(e.key==="ArrowLeft")clsGo(-1);
});

/* ================= boot ================= */
loadPeople();loadP();saveAll();renderHome();
</script>
</body>
</html>
